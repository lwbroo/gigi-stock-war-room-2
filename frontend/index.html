<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1117" />
  <link rel="manifest" href="/manifest.json" />
  <title>Gigi Stock War Room v9.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      /* ── Depth layers ── */
      --bg-0: #07080d;
      --bg-1: #0d0f1a;
      --bg-2: #12141f;
      --bg-3: #181a28;
      /* ── Borders ── */
      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.13);
      /* ── Text ── */
      --text-primary: #eef0f9; --text-secondary: #8890aa; --text-muted: #44475a;
      /* ── Accent (indigo) ── */
      --accent: #818cf8; --accent-hover: #a5b4fc; --accent-dim: rgba(129,140,248,0.18);
      /* ── Semantic ── */
      --green: #34d399; --green-dim: #10b981; --green-bg: rgba(52,211,153,0.1);
      --red: #f87171;                          --red-bg: rgba(248,113,113,0.1);
      --yellow: #fbbf24;                       --yellow-bg: rgba(251,191,36,0.1);
      --purple: #c084fc;                       --purple-bg: rgba(192,132,252,0.1);
      /* ── Glass ── */
      --glass: rgba(13,15,26,0.75);
      --glass-border: rgba(255,255,255,0.075);
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
      /* ── Sticky cell solids (must be opaque) ── */
      --sticky: #0d0f1a; --sticky-even: #101320; --sticky-hover: #161b30;
    }
    body {
      background: var(--bg-0); color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; line-height: 1.5;
      background-image: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(99,102,241,0.07) 0%, transparent 70%);
    }
    .app { max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px; }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px; padding-bottom: 20px;
      border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #1e1f3a 0%, #16253a 100%);
      border-radius: 14px; display: flex; align-items: center;
      justify-content: center; font-size: 22px; flex-shrink: 0;
      box-shadow: 0 0 0 1px rgba(129,140,248,0.25), 0 4px 16px rgba(0,0,0,0.5);
    }
    .header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; color: var(--text-primary); }
    .header-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; font-weight: 500; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .sync-pill { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; letter-spacing: 0.02em; transition: all 0.2s; }
    .sync-idle   { color: var(--text-muted); background: transparent; }
    .sync-saving { color: var(--yellow); background: var(--yellow-bg); border: 1px solid rgba(251,191,36,0.2); }
    .sync-saved  { color: var(--green);  background: var(--green-bg);  border: 1px solid rgba(52,211,153,0.2); }
    .sync-error  { color: var(--red);    background: var(--red-bg);    border: 1px solid rgba(248,113,113,0.2); }
    .auto-pill { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; color: var(--purple); background: var(--purple-bg); border: 1px solid rgba(192,132,252,0.2); }

    /* ── Market Tabs ── */
    .market-tabs {
      display: flex; gap: 4px; margin-bottom: 8px;
      background: rgba(13,15,26,0.8); border: 1px solid var(--glass-border);
      border-radius: 14px; padding: 5px;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .market-tab {
      flex: 1; padding: 11px 16px; border-radius: 10px; border: none;
      background: transparent; color: var(--text-muted);
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.22s; display: flex; align-items: center;
      justify-content: center; gap: 8px; font-family: inherit;
    }
    .market-tab:hover:not(.active) { color: var(--text-secondary); background: rgba(255,255,255,0.04); }
    .market-tab.active { color: var(--text-primary); }
    .market-tab.active.tw {
      background: linear-gradient(135deg, rgba(239,68,68,0.18), rgba(220,38,38,0.08));
      box-shadow: 0 2px 12px rgba(239,68,68,0.15), 0 0 0 1px rgba(239,68,68,0.25), inset 0 1px 0 rgba(255,255,255,0.07);
      color: #fca5a5;
    }
    .market-tab.active.us {
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(59,130,246,0.1));
      box-shadow: 0 2px 12px rgba(99,102,241,0.2), 0 0 0 1px rgba(129,140,248,0.3), inset 0 1px 0 rgba(255,255,255,0.07);
      color: #a5b4fc;
    }
    .tab-flag { font-size: 18px; line-height: 1; }
    .tab-count { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; background: rgba(255,255,255,0.07); color: var(--text-muted); min-width: 22px; text-align: center; }
    .market-tab.active .tab-count { background: rgba(255,255,255,0.12); color: var(--text-secondary); }

    /* ── App Nav ── */
    .app-nav {
      display: flex; gap: 3px; margin-bottom: 18px;
      background: rgba(13,15,26,0.8); border: 1px solid var(--glass-border);
      border-radius: 14px; padding: 4px;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .nav-tab {
      flex: 1; padding: 9px 10px; border-radius: 10px; border: none;
      background: transparent; color: var(--text-muted);
      font-size: 12.5px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center;
      justify-content: center; gap: 5px; font-family: inherit;
    }
    .nav-tab:hover:not(.active) { color: var(--text-secondary); background: rgba(255,255,255,0.04); }
    .nav-tab.active {
      background: linear-gradient(135deg, rgba(99,102,241,0.22), rgba(129,140,248,0.12));
      color: #a5b4fc;
      box-shadow: 0 2px 10px rgba(99,102,241,0.2), 0 0 0 1px rgba(129,140,248,0.2), inset 0 1px 0 rgba(255,255,255,0.07);
    }

    /* ── Dashboard Stats ── */
    .stats-row {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 8px; margin-bottom: 16px;
    }
    .stat-card {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 12px; padding: 14px 16px;
      display: flex; flex-direction: column; gap: 3px;
      transition: all 0.2s; backdrop-filter: blur(8px);
    }
    .stat-card.clickable { cursor: pointer; }
    .stat-card.clickable:hover { border-color: var(--border-strong); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
    .stat-card.f-buy  { border-color: rgba(52,211,153,0.4);  background: rgba(52,211,153,0.07);  box-shadow: 0 0 20px rgba(52,211,153,0.06); }
    .stat-card.f-sell { border-color: rgba(248,113,113,0.4); background: rgba(248,113,113,0.07); box-shadow: 0 0 20px rgba(248,113,113,0.06); }
    .stat-card.f-warn { border-color: rgba(251,191,36,0.4);  background: rgba(251,191,36,0.07);  box-shadow: 0 0 20px rgba(251,191,36,0.06); }
    .stat-val { font-size: 24px; font-weight: 800; line-height: 1.1; letter-spacing: -0.5px; }
    .stat-lbl { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
    .sv-buy     { color: var(--green); }
    .sv-sell    { color: var(--red); }
    .sv-warn    { color: var(--yellow); }
    .sv-nodata  { color: var(--text-muted); }
    .sv-total   { color: var(--accent); }

    /* ── Cards ── */
    .card {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 16px; padding: 22px 24px; margin-bottom: 16px;
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    .card-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text-muted); margin-bottom: 16px; }

    /* ── Inputs ── */
    input[type="text"], input[type="password"] {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 9px; padding: 8px 13px;
      color: var(--text-primary); font-size: 14px; outline: none;
      transition: border-color 0.18s, box-shadow 0.18s; font-family: inherit;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: rgba(129,140,248,0.5);
      box-shadow: 0 0 0 3px rgba(129,140,248,0.12);
    }
    input::placeholder { color: var(--text-muted); }
    input.ticker-input { width: 230px; font-family: 'SFMono-Regular', Consolas, monospace; }
    input.token-input  { flex: 1; min-width: 180px; max-width: 360px; }

    /* ── Buttons ── */
    .btn { padding: 8px 16px; border-radius: 9px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.18s; white-space: nowrap; font-family: inherit; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-add {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: #fff; box-shadow: 0 2px 8px rgba(99,102,241,0.35);
    }
    .btn-add:hover:not(:disabled) { box-shadow: 0 4px 16px rgba(99,102,241,0.45); transform: translateY(-1px); }
    .btn-ghost { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-secondary); }
    .btn-ghost:hover:not(:disabled) { background: rgba(255,255,255,0.08); border-color: var(--border-strong); color: var(--text-primary); }
    .btn-scan {
      background: linear-gradient(135deg, #10b981, #34d399);
      color: #07080d; padding: 10px 28px; font-size: 14px; font-weight: 700;
      box-shadow: 0 2px 12px rgba(52,211,153,0.3);
    }
    .btn-scan:hover:not(:disabled) { box-shadow: 0 4px 20px rgba(52,211,153,0.45); transform: translateY(-1px); }
    .btn-danger { background: rgba(248,113,113,0.07); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }
    .btn-danger:hover:not(:disabled) { background: rgba(248,113,113,0.14); }

    /* ── Ticker chips ── */
    .input-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .chip-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 13px; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 7px; padding: 4px 10px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 12.5px; font-weight: 600; transition: all 0.15s;
    }
    .chip:hover { border-color: var(--border-strong); background: rgba(255,255,255,0.08); }
    .chip-x { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px; line-height: 1; padding: 0 0 0 3px; transition: color 0.15s; }
    .chip-x:hover { color: var(--red); }
    .empty { color: var(--text-muted); font-size: 13px; font-style: italic; }

    /* ── Scanner ── */
    .scan-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .scan-hint { font-size: 12px; color: var(--text-muted); }
    .token-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .token-label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
    .auto-scan-info { margin-top: 12px; font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
    .error-box { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.25); color: var(--red); border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-top: 10px; }

    /* ── Results ── */
    .result-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 13px; flex-wrap: wrap; }
    .result-meta { font-size: 12px; color: var(--text-muted); }
    .result-meta .buy-count { color: var(--green); font-weight: 700; }
    .scan-time { font-size: 11px; color: var(--text-muted); margin-left: auto; }
    .scan-time .auto-tag { display: inline-block; margin-left: 4px; background: var(--purple-bg); color: var(--purple); border-radius: 4px; padding: 0 5px; font-size: 10px; font-weight: 700; }

    /* ── Table ── */
    .table-scroll { overflow-x: auto; position: relative; border-radius: 10px; }
    table { width: max-content; min-width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      position: sticky; top: 0; z-index: 2;
      text-align: left; padding: 8px 12px; font-size: 10.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted);
      border-bottom: 1px solid rgba(255,255,255,0.06); background: var(--sticky);
      white-space: nowrap;
    }
    td {
      padding: 9px 12px; border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text-secondary); white-space: nowrap; vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr:nth-child(even) td { background: rgba(255,255,255,0.018); }
    tbody tr:hover td { background: rgba(129,140,248,0.07) !important; cursor: pointer; }
    tbody tr:hover td { box-shadow: inset 0 1px 0 rgba(129,140,248,0.1), inset 0 -1px 0 rgba(129,140,248,0.1); }
    .td-code { font-family: 'SFMono-Regular', Consolas, monospace; color: var(--accent); font-weight: 700; }
    .td-name { color: var(--text-primary); font-weight: 500; }
    .td-num  { font-family: 'SFMono-Regular', Consolas, monospace; text-align: right; }

    /* ── Frozen columns ── */
    .col-s1 {
      position: sticky; left: 0; z-index: 3;
      background: var(--sticky); min-width: 112px; max-width: 112px;
    }
    .col-s2 {
      position: sticky; left: 112px; z-index: 3;
      background: var(--sticky); min-width: 138px; max-width: 138px;
      overflow: hidden; text-overflow: ellipsis;
      box-shadow: 6px 0 18px rgba(0,0,0,0.6);
      border-right: 1px solid rgba(255,255,255,0.05);
    }
    tbody tr:nth-child(even) td.col-s1,
    tbody tr:nth-child(even) td.col-s2 { background: var(--sticky-even); }
    tbody tr:hover td.col-s1,
    tbody tr:hover td.col-s2 { background: var(--sticky-hover) !important; box-shadow: none; }
    tbody tr:hover td.col-s2 { box-shadow: 6px 0 18px rgba(0,0,0,0.6) !important; }
    thead th.col-s1 { z-index: 4; background: var(--sticky); }
    thead th.col-s2 { z-index: 4; background: var(--sticky); box-shadow: 6px 0 18px rgba(0,0,0,0.6); border-right: 1px solid rgba(255,255,255,0.05); }

    /* ── Badges ── */
    .badge-buy        { display: inline-flex; align-items: center; gap: 3px; background: rgba(52,211,153,0.12); color: var(--green); padding: 2px 7px; border-radius: 20px; font-weight: 700; font-size: 9.5px; border: 1px solid rgba(52,211,153,0.3); }
    .badge-strong-buy { display: inline-flex; align-items: center; gap: 3px; background: rgba(52,211,153,0.2); color: #6ee7b7; padding: 2px 7px; border-radius: 20px; font-weight: 800; font-size: 9.5px; border: 1px solid rgba(52,211,153,0.5); box-shadow: 0 0 10px rgba(52,211,153,0.2); white-space: nowrap; }
    .badge-none   { color: var(--text-muted); font-size: 13px; }
    .badge-nodata { color: var(--text-muted); font-size: 11px; font-style: italic; }
    .badge-err    { color: var(--red); font-size: 11px; }
    .badge-sell   { display: inline-flex; align-items: center; gap: 3px; background: rgba(248,113,113,0.12); color: var(--red); padding: 2px 7px; border-radius: 20px; font-weight: 700; font-size: 9.5px; border: 1px solid rgba(248,113,113,0.35); white-space: nowrap; }
    .badge-warn   { display: inline-flex; align-items: center; gap: 3px; background: rgba(251,191,36,0.12); color: var(--yellow); padding: 2px 7px; border-radius: 20px; font-weight: 700; font-size: 9.5px; border: 1px solid rgba(251,191,36,0.35); white-space: nowrap; }
    .btn-row-remove { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 15px; line-height: 1; padding: 2px 4px; border-radius: 4px; transition: color 0.15s; }
    .btn-row-remove:hover { color: var(--red); }
    .btn-chart { background: rgba(255,255,255,0.05); border: 1px solid var(--border); cursor: pointer; color: var(--text-muted); font-size: 11px; padding: 2px 7px; border-radius: 6px; transition: all 0.15s; margin-left: 5px; }
    .btn-chart:hover { border-color: rgba(129,140,248,0.4); color: var(--accent); background: rgba(129,140,248,0.08); }

    /* ── Condition pills ── */
    .cond-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; margin-bottom: 2px; }
    .cond-label { font-size: 11px; color: var(--text-muted); margin-top: 12px; margin-bottom: 4px; }
    .cond-pill { display: flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 20px; border: 1px solid; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s; user-select: none; white-space: nowrap; font-family: inherit; }
    .cond-pill.on  { background: rgba(52,211,153,0.1); border-color: rgba(52,211,153,0.35); color: var(--green); }
    .cond-pill.off { background: transparent; border-color: var(--border); color: var(--text-muted); text-decoration: line-through; }
    .cond-dots { display: flex; gap: 3px; margin-top: 5px; }
    .cdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .cdot-pass { background: var(--green); box-shadow: 0 0 4px rgba(52,211,153,0.6); }
    .cdot-fail { background: var(--red); }
    .cdot-off  { background: var(--border); }
    .thresh-active-note { font-size: 11px; color: var(--yellow); margin-top: 8px; }

    /* ── Smart import ── */
    .import-divider { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .import-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 8px; }
    textarea.import-area { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 9px; padding: 10px 13px; color: var(--text-primary); font-size: 13px; font-family: inherit; outline: none; resize: vertical; min-height: 72px; transition: border-color 0.18s, box-shadow 0.18s; line-height: 1.5; }
    textarea.import-area:focus { border-color: rgba(129,140,248,0.5); box-shadow: 0 0 0 3px rgba(129,140,248,0.1); }
    textarea.import-area::placeholder { color: var(--text-muted); }
    .import-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .import-feedback { font-size: 12px; color: var(--green); flex: 1; animation: fadein 0.2s ease; }
    @keyframes fadein { from { opacity:0; } to { opacity:1; } }

    /* ── Collapsible ── */
    .collapse-header { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
    .collapse-chevron { margin-left: auto; color: var(--text-muted); transition: transform 0.22s; font-size: 12px; flex-shrink: 0; }
    .collapse-chevron.open { transform: rotate(90deg); }
    .feature-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 10px; margin-top: 14px; }
    .feature-tile { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 13px 15px; display: flex; gap: 12px; align-items: flex-start; transition: border-color 0.18s; }
    .feature-tile:hover { border-color: var(--border-strong); }
    .feature-icon  { font-size: 20px; flex-shrink: 0; line-height: 1.3; }
    .feature-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .feature-desc  { font-size: 12px; color: var(--text-muted); margin-top: 2px; line-height: 1.5; }

    /* ── Changelog ── */
    .changelog-list { margin-top: 14px; display: flex; flex-direction: column; gap: 14px; }
    .cl-entry { display: flex; gap: 12px; align-items: flex-start; }
    .cl-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 5px; background: rgba(255,255,255,0.06); color: var(--text-muted); white-space: nowrap; margin-top: 2px; flex-shrink: 0; }
    .cl-badge.current { background: rgba(129,140,248,0.15); color: var(--accent); border: 1px solid rgba(129,140,248,0.2); }
    .cl-date  { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .cl-items { font-size: 13px; color: var(--text-secondary); }
    .cl-items li { margin-top: 2px; list-style: disc; margin-left: 16px; line-height: 1.6; }

    /* ── Spinner ── */

    .chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useRef, useMemo } = React;

    const API_BASE = 'https://gigi-stock-war-room-2.onrender.com';

    const MARKETS = {
      tw: { label: 'Taiwan', flag: '🇹🇼', lsKey: 'gigiTickersTW', placeholder: 'e.g. 2330.TW, 2454.TW' },
      us: { label: 'USA',    flag: '🇺🇸', lsKey: 'gigiTickersUS', placeholder: 'e.g. AAPL, TSLA, NVDA'  },
    };
    const COND_KEYS = ['price','volume','trend','candle','rsi','bias'];

    function loadLS(key, fallback) {
      try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
      catch { return fallback; }
    }
    function saveLS(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

    function loadWithMigration(newKey, legacyKey) {
      const saved = loadLS(newKey, null);
      if (saved !== null) return saved;
      const legacy = loadLS(legacyKey, []);
      if (legacy.length > 0) { saveLS(newKey, legacy); try { localStorage.removeItem(legacyKey); } catch {} }
      return legacy;
    }

    function formatScanTime(iso) {
      if (!iso) return '';
      const d = new Date(iso); const now = new Date();
      const isToday = d.toDateString() === now.toDateString();
      const yest = new Date(now); yest.setDate(yest.getDate() - 1);
      const isYest = d.toDateString() === yest.toDateString();
      const t = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if (isToday) return `Today ${t}`;
      if (isYest)  return `Yesterday ${t}`;
      return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ` ${t}`;
    }

    function minsUntilMidnight() {
      const now = new Date(); const mid = new Date(now); mid.setHours(24,0,0,0);
      const ms = mid - now; const h = Math.floor(ms/3600000); const m = Math.floor((ms%3600000)/60000);
      return h > 0 ? `${h}h ${m}m` : `${m}m`;
    }

    function recomputeConds(row, t) {
      if (!row || !row.close) return {};
      const mid = (row.high != null && row.low != null) ? (row.high + row.low) / 2 : row.close;
      return {
        price:  Boolean(row.close > row.ma20),
        volume: Boolean(row.volume > t.volMult * row.vol_ma20),
        trend:  Boolean(row.ma20 > row.ma60 && row.ma60 > row.ma120),
        candle: Boolean(row.close > row.open && row.close > mid),
        rsi:    Boolean(row.rsi14 > t.rsiLow && row.rsi14 < t.rsiHigh),
        bias:   Boolean(row.bias < t.biasPct),
      };
    }

    const DEFAULT_THRESH = { volMult: 1.2, rsiLow: 52, rsiHigh: 60, biasPct: 3, minGreenBuy: 4 };

    function isDefaultThresh(t) {
      return t.volMult === 1.2 && t.rsiLow === 52 && t.rsiHigh === 60 && t.biasPct === 3;
    }

    /* ── TradingView Modal ── */
    function TradingViewModal({ ticker, market, onClose }) {
      const cid = 'tv-chart-root';
      useEffect(() => {
        const sym = market === 'tw' ? `TWSE:${ticker.replace('.TW','')}` : ticker;
        const create = () => {
          const el = document.getElementById(cid);
          if (el) el.innerHTML = '';
          if (window.TradingView) {
            new window.TradingView.widget({
              container_id: cid, autosize: true, symbol: sym,
              interval: 'D', timezone: 'Asia/Taipei', theme: 'dark',
              style: '1', locale: 'zh_TW', toolbar_bg: '#161b22',
              enable_publishing: false, save_image: false,
              studies: ['MASimple@tv-basicstudies','Volume@tv-basicstudies'],
            });
          }
        };
        if (!window.TradingView) {
          const s = document.createElement('script');
          s.src = 'https://s3.tradingview.com/tv.js'; s.async = true; s.onload = create;
          document.head.appendChild(s);
        } else { create(); }
        return () => { const el = document.getElementById(cid); if (el) el.innerHTML = ''; };
      }, [ticker, market]);

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div className="modal-hdr">
              <span className="modal-title">📈 {ticker} — Daily Chart</span>
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            <div id={cid} style={{height:520, flexShrink:0}}></div>
          </div>
        </div>
      );
    }

    /* ── Signal badge helper ── */
    function SignalBadge({ row, conds }) {
      if (!row || row.signal === 'NO_DATA') return <span className="badge-nodata">no data</span>;
      if (row.signal === 'ERROR') return <span className="badge-err">error</span>;
      const sf = row.sell_flags || {};
      const sc = [sf.is_trend_broken, sf.is_momentum_lost, sf.is_heavy_distribution].filter(Boolean).length;
      if (sc >= 2) return <span className="badge-sell">▼ SELL</span>;
      if (sc === 1) return <span className="badge-warn">⚠ WARNING</span>;
      if (row.signal === 'YES') {
        const gc = conds ? Object.values(conds).filter(Boolean).length : 0;
        if (gc === 6) return <span className="badge-strong-buy">▲ STRONG BUY</span>;
        return <span className="badge-buy">▲ BUY</span>;
      }
      return <span className="badge-none">—</span>;
    }

    /* ── Predicted return from OLS model (v5.0) — must match backend _row_to_features ── */
    function computePredictedReturn(row, regData) {
      if (!regData || regData.status !== 'ok') return null;
      const {intercept, coefficients} = regData;
      if (!coefficients || !coefficients.length) return null;
      const macdMap = {golden:2, above:1, none:0, below:-1, death:-2};
      const m = row.monthly_trend, w = row.weekly_trend;
      const feat = [
        macdMap[row.macd_cross || 'none'] || 0,
        Math.min((row.adx14 || 25), 50) / 50,
        row.obv_trend === 'rising' ? 1 : row.obv_trend === 'falling' ? -1 : 0,
        m === true ? 1 : m === false ? -1 : 0,
        row.is_breakout20 ? 1 : 0,
        row.vol_expansion ? 1 : 0,
        Math.max(-10, Math.min(10, (row.inst_foreign || 0) / 1000)),
        Math.max(-5,  Math.min(5,  (row.inst_trust   || 0) / 1000)),
        Math.max(-3,  Math.min(3,  row.rs_score || 0)),
        w === true ? 1 : w === false ? -1 : 0,
        ((row.rsi14 || 50) - 50) / 50,
        row.bias || 0,
      ];
      const pred = intercept + feat.reduce((s, f, i) => s + f * (coefficients[i] || 0), 0);
      return Math.round(pred * 1000) / 10; // percentage
    }

    const FEAT_LABELS = {
      macd_num:'MACD', adx_norm:'ADX強度', obv_num:'OBV籌碼', monthly_num:'月線趨勢',
      breakout20:'突破20日', vol_exp:'量能擴張', inst_fgn_k:'外資買賣', inst_tst_k:'投信買賣',

    /* ── Overall signal (v6.0) ── */
    function computeOverall(row, conds, sentimentScore = null, vixData = null) {
      if (!row || row.signal === 'NO_DATA' || row.signal === 'ERROR') return null;
      const sf = row.sell_flags || {};
      let score = 0;
      const reasons = [];
      const allDetails = [];
      const d = (text, pts) => { allDetails.push({text, pts}); };

      // ── v9.0 VIX 市場環境（US 限定）──
      if (vixData?.vix != null) {
        const vix = vixData.vix;
        if      (vix > 30) { score -= 20; reasons.push(`VIX極恐慌(${vix})`); d(`VIX ${vix} 極度恐慌`, -20); }
        else if (vix > 25) { score -= 10; reasons.push(`VIX恐慌(${vix})`);   d(`VIX ${vix} 恐慌`,     -10); }
        else if (vix > 20) { score -=  3;                                      d(`VIX ${vix} 警戒`,      -3); }
        else if (vix < 15) { score +=  5; reasons.push(`VIX樂觀(${vix})`);   d(`VIX ${vix} 市場樂觀`,  +5); }
      }

      // ── 市場情緒 (Grok) ──
      if (sentimentScore != null) {
        if      (sentimentScore >= 0.5)  { score += 10; reasons.push('市場極樂觀'); d(`Grok情緒 +${sentimentScore.toFixed(2)}`, +10); }
        else if (sentimentScore >= 0.2)  { score +=  5; reasons.push('市場偏樂觀'); d(`Grok情緒 +${sentimentScore.toFixed(2)}`,  +5); }
        else if (sentimentScore <= -0.5) { score -= 15; reasons.push('市場極悲觀'); d(`Grok情緒 ${sentimentScore.toFixed(2)}`, -15); }
        else if (sentimentScore <= -0.2) { score -=  8; reasons.push('市場偏悲觀'); d(`Grok情緒 ${sentimentScore.toFixed(2)}`,  -8); }
      }

      // ── Sell flags ──
      if (sf.is_trend_broken)       { score -= 20; reasons.push('跌破MA20');   d('跌破MA20', -20); }
      if (sf.is_momentum_lost)      { score -= 15; reasons.push('RSI<50');     d('RSI<50', -15); }
      if (sf.is_heavy_distribution) { score -= 15; reasons.push('量大收黑');   d('量大收黑', -15); }

      // ── v6: 股票已延伸 ──
      if (row.is_extended)          { score -= 15; reasons.push('5日已漲5%+慎追'); d('5日已漲5%+慎追', -15); }

      // ── v6: 財報即將 ──
      if (row.near_earnings)        { score -= 12; reasons.push('財報即將風險'); d('財報即將風險', -12); }

      // ── v6: 連續確認訊號 ──
      if (row.confirmed_signal)     { score += 25; reasons.push('✅連續確認'); d('連續確認訊號(2日)', +25); }

      // ── 6 buy conditions ──
      const gc = conds ? Object.values(conds).filter(Boolean).length : 0;
      score += gc * 7;
      if (gc > 0) d(`買進條件 ${gc}/6 個通過`, gc * 7);

      // ── MACD ──
      if (row.macd_cross === 'golden')     { score += 18; reasons.push('MACD黃金交叉'); d('MACD黃金交叉', +18); }
      else if (row.macd_cross === 'above') { score += 6;  d('MACD多頭', +6); }
      else if (row.macd_cross === 'death') { score -= 18; reasons.push('MACD死亡交叉'); d('MACD死亡交叉', -18); }
      else if (row.macd_cross === 'below') { score -= 6;  d('MACD空頭', -6); }

      // ── ADX ──
      if (row.adx14 != null) {
        if (row.adx14 > 30)      { score += 12; reasons.push(`ADX強(${row.adx14.toFixed(0)})`); d(`ADX強勢(${row.adx14.toFixed(0)})`, +12); }
        else if (row.adx14 > 25) { score += 7;  d(`ADX中等(${row.adx14.toFixed(0)})`, +7); }
        else if (row.adx14 < 20) { score -= 5;  reasons.push('ADX盤整'); d(`ADX偏弱(${row.adx14.toFixed(0)})`, -5); }
        else                     { d(`ADX中性(${row.adx14.toFixed(0)})`, 0); }
      }

      // ── OBV ──
      if (row.obv_trend === 'rising')  { score += 8;  reasons.push('OBV吸籌'); d('OBV上升(吸籌)', +8); }
      if (row.obv_trend === 'falling') { score -= 8;  reasons.push('OBV出貨'); d('OBV下降(出貨)', -8); }

      // ── Monthly trend ──
      if (row.monthly_trend === true)  { score += 8;  reasons.push('月線多頭'); d('月線多頭排列', +8); }
      if (row.monthly_trend === false) { score -= 8;  reasons.push('月線空頭'); d('月線空頭排列', -8); }

      // ── Breakout ──
      if (row.is_breakout20) { score += 12; reasons.push('突破20日高點'); d('突破20日新高', +12); }

      // ── Volume expansion ──
      if (row.vol_expansion) { score += 7; reasons.push('量能持續放大'); d('量能持續放大(3日)', +7); }

      // ── v9.0 量能爆發 (>2×VMA20) ──
      if (row.volume != null && row.vol_ma20 != null && row.vol_ma20 > 0) {
        const volRatio = row.volume / row.vol_ma20;
        if      (volRatio >= 3.0) { score += 15; reasons.push('爆量3x'); d(`爆量 ${volRatio.toFixed(1)}×VMA20`, +15); }
        else if (volRatio >= 2.0) { score += 10; reasons.push('放量2x'); d(`放量 ${volRatio.toFixed(1)}×VMA20`, +10); }
      }

      // ── Institutional ──
      if (row.inst_foreign != null) {
        if (row.inst_foreign > 1000)       { score += 15; reasons.push('外資大買'); d(`外資大買 +${row.inst_foreign}張`, +15); }
        else if (row.inst_foreign > 0)     { score += 7;  reasons.push('外資買超'); d(`外資買超 +${row.inst_foreign}張`, +7); }
        else if (row.inst_foreign < -1000) { score -= 12; reasons.push('外資大賣'); d(`外資大賣 ${row.inst_foreign}張`, -12); }
        else if (row.inst_foreign < 0)     { score -= 5;  reasons.push('外資賣超'); d(`外資賣超 ${row.inst_foreign}張`, -5); }
      }
      if (row.inst_trust != null) {
        if (row.inst_trust > 500)       { score += 8; reasons.push('投信買超'); d(`投信買超 +${row.inst_trust}張`, +8); }
        else if (row.inst_trust < -500) { score -= 6; reasons.push('投信賣超'); d(`投信賣超 ${row.inst_trust}張`, -6); }
      }

      // ── 大盤 ──
      if (row.market_week_rising === true)  { score += 8; reasons.push('大盤週漲'); d('大盤本週上漲', +8); }
      if (row.market_week_rising === false) { score -= 8; reasons.push('大盤週跌'); d('大盤本週下跌', -8); }
      if (row.market_regime_bull === false) { score -= 5; reasons.push('大盤空頭'); d('大盤空頭環境', -5); }

      // ── EPS ──
      if (row.eps_growth != null) {
        if (row.eps_growth > 20)       { score += 15; reasons.push(`EPS+${row.eps_growth.toFixed(0)}%`); d(`EPS成長 +${row.eps_growth.toFixed(0)}%`, +15); }
        else if (row.eps_growth > 0)   { score += 8;  reasons.push('EPS正成長'); d(`EPS正成長 +${row.eps_growth.toFixed(0)}%`, +8); }
        else if (row.eps_growth < -10) { score -= 10; reasons.push('EPS衰退'); d(`EPS衰退 ${row.eps_growth.toFixed(0)}%`, -10); }
      }

      // ── 營收 ──
      if (row.revenue_growth != null) {
        if (row.revenue_growth > 10)  { score += 8; reasons.push(`營收+${row.revenue_growth.toFixed(0)}%`); d(`月營收成長 +${row.revenue_growth.toFixed(0)}%`, +8); }
        else if (row.revenue_growth < 0) { score -= 5; reasons.push('營收下滑'); d(`月營收下滑 ${row.revenue_growth.toFixed(0)}%`, -5); }
      }

      // ── RS ──
      if (row.rs_score != null) {
        if (row.rs_score > 1.5)      { score += 10; reasons.push('RS強勢'); d(`RS強勢(${row.rs_score.toFixed(2)})`, +10); }
        else if (row.rs_score > 1.2) { score += 6;  d(`RS偏強(${row.rs_score.toFixed(2)})`, +6); }
        else if (row.rs_score < 0.5) { score -= 8;  reasons.push('RS弱'); d(`RS弱勢(${row.rs_score.toFixed(2)})`, -8); }
      }

      // ── Weekly trend ──
      if (row.weekly_trend === true)  { score += 6; reasons.push('週線多頭'); d('週線多頭', +6); }
      if (row.weekly_trend === false) { score -= 6; reasons.push('週線空頭'); d('週線空頭', -6); }

      // ── Pattern ──
      const bullPats = ['紅三兵','多頭吞噬','錘子線'];
      const bearPats = ['黑三兵','空頭吞噬','射擊之星'];
      if (row.pattern && bullPats.includes(row.pattern)) { score += 8;  reasons.push(row.pattern); d(`K線：${row.pattern}`, +8); }
      if (row.pattern && bearPats.includes(row.pattern)) { score -= 10; reasons.push(row.pattern); d(`K線：${row.pattern}`, -10); }

      // ── 52-week ──
      if (row.pct_from_52high != null) {
        if (row.pct_from_52high > -5)       { score += 6; reasons.push('逼近年高'); d(`距年高${row.pct_from_52high.toFixed(0)}%`, +6); }
        else if (row.pct_from_52high > -15) { score += 3; d(`距年高${row.pct_from_52high.toFixed(0)}%`, +3); }
        else if (row.pct_from_52high < -40) { score -= 5; d(`距年高${row.pct_from_52high.toFixed(0)}%`, -5); }
      }

      // ── Verdict (thresholds adjusted for v6) ──
      let label, color, bg;
      if      (score >= 90) { label = '🚀 強力買進'; color = '#56d364'; bg = 'rgba(63,185,80,0.18)'; }
      else if (score >= 65) { label = '🟢 積極買進'; color = 'var(--green)'; bg = 'rgba(63,185,80,0.10)'; }
      else if (score >= 35) { label = '🔵 中性觀望'; color = 'var(--accent)'; bg = 'rgba(88,166,255,0.08)'; }
      else if (score >= 10) { label = '⚠️ 減碼警示'; color = 'var(--yellow)'; bg = 'rgba(210,153,34,0.12)'; }
      else                  { label = '🔴 強力賣出'; color = 'var(--red)'; bg = 'rgba(248,81,73,0.12)'; }

      const topReasons = reasons.slice(0, 5).join(' · ');
      return { label, color, bg, score, reasons: topReasons, allDetails, gc };
    }

    /* ── Pattern badge ── */
    const _BULL_PAT = new Set(['紅三兵','多頭吞噬','錘子線']);
    const _BEAR_PAT = new Set(['黑三兵','空頭吞噬','射擊之星']);
    function PatternBadge({ pattern }) {
      if (!pattern) return null;
      const cls = _BULL_PAT.has(pattern) ? 'bp-bull' : _BEAR_PAT.has(pattern) ? 'bp-bear' : 'bp-neutral';
      return <span className={`badge-pattern ${cls}`}>{pattern}</span>;
    }

      const reloadFromSheet = async () => {
        const mkt = market;
        try {
          const r = await fetch(`${API_BASE}/api/watchlist?market=${mkt}`);
          if (!r.ok) return;
          const d = await r.json();
          if (Array.isArray(d.tickers)) {
            if (mkt === 'tw') { setTwTickers(d.tickers); saveLS('gigiTickersTW', d.tickers); }
            else              { setUsTickers(d.tickers); saveLS('gigiTickersUS', d.tickers); }
          }
        } catch {}
      };

      // ── watchlist mutations ────────────────────────────────────────────────────
      const addTicker = () => {
        const t = newTicker.trim().toUpperCase();
        if (!t || tickers.includes(t)) { setNewTicker(''); return; }
        userModified.current[market] = true;
        const next = [...tickers, t]; setTickers(next); saveLS(meta.lsKey, next); setNewTicker(''); _syncSave(next, market);
      };

      const removeTicker = (t) => {
        userModified.current[market] = true;
        const next = tickers.filter(x => x !== t); setTickers(next); saveLS(meta.lsKey, next); _syncSave(next, market);
      };

      const removeFromScan = (ticker) => {
        removeTicker(ticker);
        setScanResults(prev => prev.filter(r => r.ticker !== ticker));
        setSavedResults(prev => {
          const entry = prev[market]; if (!entry) return prev;
          return { ...prev, [market]: { ...entry, data: (entry.data||[]).filter(r => r.ticker !== ticker) } };
        });
      };

      // ── manual scan ───────────────────────────────────────────────────────────
      const runScan = async () => {
        const currentTickers = tickersRef.current;
        if (!currentTickers.length) return;
        const mkt = market;
        setScanning(true); setScanError(''); setScanResults([]);
        try {
          const r = await fetch(`${API_BASE}/api/scan`, {
            method: 'POST', headers: { 'Content-Type':'application/json' },
            body: JSON.stringify({ tickers: currentTickers, market: mkt, tg_bot_token: tgBotToken, tg_chat_id: tgChatId }),
          });
          const d = await r.json();
          if (!r.ok) throw new Error(d.detail || 'Scan failed');
          setScanResults(d.data||[]);
          const entry = { data: d.data||[], scannedAt: new Date().toISOString(), auto: false };
          setSavedResults(prev => ({ ...prev, [mkt]: entry }));
          addToHistory(d.data||[], mkt, false);
          await checkAlerts(d.data||[], mkt);
          // v5.0: refresh regression coeffs after scan
          fetchRegCoeffs(mkt);
        } catch (e) { setScanError(e.message); }
        setScanning(false);
      };

      // ── scan history ──────────────────────────────────────────────────────────
      const addToHistory = (data, mkt, isAuto) => {
        const entry = { id: Date.now(), market: mkt, scannedAt: new Date().toISOString(), auto: isAuto, data };
        setScanHistory(prev => {
          const next = [entry, ...prev].slice(0, 10);
          saveLS('gigiScanHistory', next); return next;
        });
      };

      // ── regression model ──────────────────────────────────────────────────────
      const fetchRegCoeffs = async (mkt) => {
        try {
          const r = await fetch(`${API_BASE}/api/regression/coeffs?market=${mkt||market}`);
          const data = await r.json();
          if (data.status === 'ok') setRegCoeffs(data);
        } catch(e) { /* model not trained yet, silent */ }
      };

      const trainModel = async () => {
        setRegLoading(true); setRegStatus('');
        try {
          const r = await fetch(`${API_BASE}/api/regression/train?market=${market}`, {method:'POST'});
          const data = await r.json();
          if (data.status === 'ok') {
            setRegStatus(`✅ 訓練完成！R²=${data.r2.toFixed(3)}，使用 ${data.n_samples} 筆數據`);
            await fetchRegCoeffs(market);
          } else {
            setRegStatus(`⏳ ${data.message}`);
          }
        } catch(e) { setRegStatus('❌ 訓練失敗: ' + e.message); }
        setRegLoading(false);
      };

      // ── price alerts ──────────────────────────────────────────────────────────
      const checkAlerts = async (results, mkt) => {
        const alerts  = priceAlertsRef.current;
        const botTok  = tgBotTokenRef.current;
        const chatId  = tgChatIdRef.current;
        if (!botTok || !chatId || !alerts.length) return;
        const triggered = alerts.filter(a => {
          if (a.market !== mkt) return false;
          const row = results.find(r => r.ticker === a.ticker);
          if (!row || row.close == null) return false;
          return a.direction === 'above' ? row.close >= a.targetPrice : row.close <= a.targetPrice;
        });
        if (!triggered.length) return;
        const msgs = triggered.map(a => {
          const row = results.find(r => r.ticker === a.ticker);
          return `${a.direction === 'above' ? '📈' : '📉'} ${a.ticker} 達到目標價！現價：${row.close}，目標：${a.targetPrice}`;
        });
        try {
          await fetch(`${API_BASE}/api/notify`, {
            method: 'POST', headers: { 'Content-Type':'application/json' },
            body: JSON.stringify({ message: '\n' + msgs.join('\n'), tg_bot_token: botTok, tg_chat_id: chatId }),
          });
        } catch {}
      };

      const addAlert = () => {
        const a = { id: Date.now(), ticker: newAlert.ticker.trim().toUpperCase(), market: newAlert.market, targetPrice: parseFloat(newAlert.targetPrice), direction: newAlert.direction };
        if (!a.ticker || isNaN(a.targetPrice)) return;
        setPriceAlerts(prev => { const next = [...prev, a]; saveLS('gigiAlerts', next); return next; });
        setNewAlert(p => ({ ...p, ticker:'', targetPrice:'' }));
      };

      const removeAlert = (id) => {
        setPriceAlerts(prev => { const next = prev.filter(a => a.id !== id); saveLS('gigiAlerts', next); return next; });
      };

      // ── portfolio ─────────────────────────────────────────────────────────────
      const addHolding = () => {
        const h = { id: Date.now(), ticker: newHolding.ticker.trim().toUpperCase(), market: newHolding.market, entryPrice: parseFloat(newHolding.entryPrice), shares: parseInt(newHolding.shares)||0, note: newHolding.note.trim() };
        if (!h.ticker || isNaN(h.entryPrice)) return;
        setPortfolio(prev => { const next = [...prev, h]; saveLS('gigiPortfolio', next); return next; });
        setNewHolding(p => ({ ...p, ticker:'', entryPrice:'', shares:'', note:'' }));
      };

      const removeHolding = (id) => {
        setPortfolio(prev => { const next = prev.filter(h => h.id !== id); saveLS('gigiPortfolio', next); return next; });
      };

      const getCurrentPrice = (ticker, mkt) => {
        const entry = savedResults[mkt]; if (!entry?.data) return null;
        return entry.data.find(r => r.ticker === ticker)?.close ?? null;
      };

      // ── thresholds ────────────────────────────────────────────────────────────
      const updateThreshold = (key, raw) => {
        const val = parseFloat(raw); if (isNaN(val)) return;
        setThresholds(prev => { const next = { ...prev, [key]: val }; saveLS('gigiThresholds', next); return next; });
      };
      const resetThresholds = () => { setThresholds({...DEFAULT_THRESH}); saveLS('gigiThresholds', {...DEFAULT_THRESH}); };

      // ── backtest (FinMind full historical) ────────────────────────────────────
      const runBacktest = async () => {
        if (!btSelected.length) return;
        setBtLoading(true); setBtError(''); setBtResults([]); setBtSummary(null); setBtExpandedRow(null); setBtAnalysis(null);
        try {
          const r = await fetch(`${API_BASE}/api/backtest/full`, {
            method: 'POST', headers: { 'Content-Type':'application/json' },
            body: JSON.stringify({
              tickers: btSelected, market,
              start_date: btStartDate, end_date: btEndDate,
              hold_days: btHoldDays,
            }),
          });
          const d = await r.json();
          if (!r.ok) throw new Error(d.detail || 'Backtest failed');
          setBtResults(d.results || []);
          setBtSummary(d.summary || null);
          setBtAnalysis(d.condition_analysis || null);
        } catch(e) { setBtError(e.message); }
        setBtLoading(false);
      };

      const toggleBtTicker = (t) => setBtSelected(prev => prev.includes(t) ? prev.filter(x=>x!==t) : [...prev, t]);

      const runGridSearch = async () => {
        if (!btSelected.length) return;
        setGsLoading(true); setGsError(''); setGsResults(null);
        try {
          const r = await fetch(`${API_BASE}/api/backtest/gridsearch`, {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ tickers: btSelected, market, start_date: btStartDate, end_date: btEndDate, hold_days: btHoldDays }),
          });
          const d = await r.json();
          if (!r.ok) throw new Error(d.detail || 'Grid search failed');
          if (d.error) throw new Error(d.error);
          setGsResults(d);
        } catch(e) { setGsError(e.message); }
        setGsLoading(false);
      };

      // ── import ────────────────────────────────────────────────────────────────
      const parseImport = () => {
        const text = importText.trim(); if (!text) return;
        const INVESTING_PRO_SIGNALS = ['估值偏低','便宜價','公允'];
        const TARGET_SIGNALS        = ['估值偏低','便宜價'];
        const isIP = INVESTING_PRO_SIGNALS.some(kw => text.includes(kw));
        let rawTickers = [];
        if (isIP) {
          const RESET_SIGNALS = ['公允','高估']; let cur = null;
          text.split('\n').forEach(line => {
            const t = line.trim();
            const m = t.match(/^(\d{4})$/) || (market === 'us' ? t.match(/^([A-Z]{1,6})$/) : null);
            if (m) { cur = m[1]; return; }
            if (TARGET_SIGNALS.some(kw => t.includes(kw))) { if (cur) rawTickers.push(cur); cur = null; return; }
            if (RESET_SIGNALS.some(kw => t.includes(kw))) cur = null;
          });
        } else {
          const tw = text.match(/\b\d{4}\b/g)||[]; const us = text.match(/\b[A-Z]{1,5}\b/g)||[];
          rawTickers = [...tw, ...us];
        }
        const formatted = rawTickers.map(t => /^\d{4}$/.test(t) ? `${t}.TW` : t);
        const toAdd = [...new Set(formatted)].filter(t => t && !tickers.includes(t));
        setImportText('');
        if (!toAdd.length) { setImportFeedback('No new tickers found.'); setTimeout(() => setImportFeedback(''), 3000); return; }
        userModified.current[market] = true;
        const next = [...tickers, ...toAdd]; setTickers(next); saveLS(meta.lsKey, next); _syncSave(next, market);
        setImportFeedback((isIP ? '🔍 InvestingPro filter: ' : '📋 Imported: ') + `added ${toAdd.length} ticker${toAdd.length !== 1 ? 's' : ''} (${toAdd.join(', ')})`);
        setTimeout(() => setImportFeedback(''), 5000);
      };

      // ── derived ───────────────────────────────────────────────────────────────
      const syncLabel = { idle:'💾 Saved', saving:'⟳ Syncing…', saved:'✓ Cloud saved', error:'⚠ Cloud sync failed' }[syncStatus];
      const toggleCond = (key) => setActiveConds(prev => ({ ...prev, [key]: !prev[key] }));
      const currentEntry = savedResults[market];
      const hasResults   = scanning || scanResults.length > 0;
      const onKey = (e) => { if (e.key === 'Enter') addTicker(); };

      const [signalFilter, setSignalFilter] = useState(null); // null | 'buy' | 'sell' | 'warn'
      const toggleFilter = (f) => setSignalFilter(prev => prev === f ? null : f);

      const sortedResults = [...scanResults].sort((a,b) => {
        const ai = a.signal==='NO_DATA'||a.signal==='ERROR'; const bi = b.signal==='NO_DATA'||b.signal==='ERROR';
        if (ai !== bi) return ai ? 1 : -1; return greenCount(b) - greenCount(a);
      });

      const isRowBuy  = (r) => { if(r.signal==='NO_DATA'||r.signal==='ERROR'||r.signal==='NO') return false; const sf=r.sell_flags||{}; if([sf.is_trend_broken,sf.is_momentum_lost,sf.is_heavy_distribution].filter(Boolean).length>=1) return false; return r.signal==='YES'; };
      const isRowSell = (r) => { const sf=r.sell_flags||{}; return [sf.is_trend_broken,sf.is_momentum_lost,sf.is_heavy_distribution].filter(Boolean).length>=2; };
      const isRowWarn = (r) => { const sf=r.sell_flags||{}; return [sf.is_trend_broken,sf.is_momentum_lost,sf.is_heavy_distribution].filter(Boolean).length===1; };

      // v3.0: sector heat — must be after isRowBuy
      const sectorHeat = useMemo(() => {
        if (!scanResults.length) return [];
        const getSector = (ticker) => {
          if (!/^\d{4}/.test(ticker)) return 'US';
          const n = parseInt(ticker.slice(0,4));
          if (n >= 2300 && n < 2500) return '半導體';
          if (n >= 2800 && n < 2900) return '金融';
          if (n >= 2000 && n < 3000) return '電子/電腦';
          if (n >= 1000 && n < 2000) return '傳產/水泥';
          if (n >= 3000 && n < 4000) return '電子零組件';
          if (n >= 4000 && n < 5000) return '生技醫療';
          if (n >= 5000 && n < 6000) return '上櫃電子';
          if (n >= 6000 && n < 7000) return '電子應用';
          return '其他';
        };
        const map = {};
        scanResults.forEach(r => {
          const sec = getSector(r.ticker);
          if (!map[sec]) map[sec] = { total:0, buy:0 };
          map[sec].total++;
          if (isRowBuy(r)) map[sec].buy++;
        });
        return Object.entries(map)
          .map(([name,v]) => ({ name, ...v, rate: v.total>0 ? v.buy/v.total : 0 }))
          .filter(s => s.total > 0)
          .sort((a,b) => b.rate - a.rate);
      }, [scanResults, thresholds]);

      const hotSectors = useMemo(() => new Set(sectorHeat.filter(s => s.rate >= 0.5).map(s => s.name)), [sectorHeat]);
      const getSectorForFilter = (ticker) => {
        if (!ticker) return null;
        const tw = ticker.replace(/\.TW$/i,'');
        if (/^(2330|2303|2308|2317|2324|2325|2327|2379|3034|3231|6770|2454|3711|2344|2345|2368|2376|2388|3702|6669)$/.test(tw)) return '半導體';
        if (/^(2382|3008|2356|2317|2354|2353|4938)$/.test(tw)) return '電子零組件';
        if (/^(2412|2408|3045|4904|4906)$/.test(tw)) return '通訊網路';
        if (/^(2301|2352|2357|2377|5347)$/.test(tw)) return 'PC/NB';
        if (/^(3037|3044|5274|6271|6415|6732|6789|8150)$/.test(tw)) return 'AI/伺服器';
        if (/^(2395|2409|3481|6669)$/.test(tw)) return '面板/光學';
        if (/^(1301|1303|1326|2103|2105)$/.test(tw)) return '傳產';
        if (/^(2881|2882|2883|2884|2885|2886|2887|2888|2889|2890|2891|2892|5880)$/.test(tw)) return '金融';
        if (/^(1216|1210|1207|2912|9905)$/.test(tw)) return '消費';
        if (ticker.includes('.')) return 'US';
        return '其他';
      };
      const displayResults = (() => {
        let r = signalFilter==='buy'  ? sortedResults.filter(isRowBuy)  :
                signalFilter==='sell' ? sortedResults.filter(isRowSell) :
                signalFilter==='warn' ? sortedResults.filter(isRowWarn) :
                sortedResults;
        if (sectorFilterOn && hotSectors.size > 0)
          r = r.filter(row => hotSectors.has(getSectorForFilter(row.ticker)));
        return r;
      })();

      // Dashboard stats from last scan
      const lastData = currentEntry?.data || [];
      const dsBuy    = lastData.filter(r => r.signal==='YES').length;
      const dsSell   = lastData.filter(r => { const sf=r.sell_flags||{}; return [sf.is_trend_broken,sf.is_momentum_lost,sf.is_heavy_distribution].filter(Boolean).length>=2; }).length;
      const dsWarn   = lastData.filter(r => { const sf=r.sell_flags||{}; return [sf.is_trend_broken,sf.is_momentum_lost,sf.is_heavy_distribution].filter(Boolean).length===1; }).length;
      const dsNoData = lastData.filter(r => r.signal==='NO_DATA'||r.signal==='ERROR').length;

      // Portfolio summary
      const portSummary = useMemo(() => {
        let totalPnl = 0; let costed = 0; let counted = 0;
        portfolio.forEach(h => {
          const cur = getCurrentPrice(h.ticker, h.market);
          if (cur && h.entryPrice && h.shares) {
            totalPnl += (cur - h.entryPrice) * h.shares;
            costed   += h.entryPrice * h.shares;
            counted++;
          }
        });
        return { totalPnl, pnlPct: costed > 0 ? (totalPnl / costed) * 100 : null, counted };
      }, [portfolio, savedResults]);

      // History row stats helper
      const histStats = (data) => {
        const buy  = data.filter(r => { if(r.signal==='NO_DATA'||r.signal==='ERROR') return false; const sf=r.sell_flags||{}; const sc=[sf.is_trend_broken,sf.is_momentum_lost,sf.is_heavy_distribution].filter(Boolean).length; if(sc>=1) return false; return Object.values(r.conds||{}).filter(Boolean).length>=4; }).length;
        const sell = data.filter(r => { const sf=r.sell_flags||{}; return [sf.is_trend_broken,sf.is_momentum_lost,sf.is_heavy_distribution].filter(Boolean).length>=2; }).length;
        const warn = data.filter(r => { const sf=r.sell_flags||{}; return [sf.is_trend_broken,sf.is_momentum_lost,sf.is_heavy_distribution].filter(Boolean).length===1; }).length;
        return { buy, sell, warn };
      };

      /* ──────────────────────────────── RENDER ──────────────────────────────── */
      return (
        <div className="app">

          {/* Header */}
          <div className="header">
            <div className="header-left">
              <div className="logo">📈</div>
              <div>
                <div className="header-title">Gigi Stock War Room</div>
                <div className="header-sub">AI-Powered Stock Scanner · v9.0</div>
              </div>
            </div>
            <div className="header-right">
              {autoScanning && <span className="auto-pill">⟳ Auto-scanning…</span>}
              <div className={`sync-pill sync-${syncStatus}`}>{syncLabel}</div>
            </div>
          </div>

          {/* Market tabs — top-level, affects all sub-tabs */}
          <div className="market-tabs">
            {Object.entries(MARKETS).map(([mkt,m]) => {
              const count = mkt==='tw' ? twTickers.length : usTickers.length;
              return (
                <button key={mkt} className={`market-tab ${mkt} ${market===mkt?'active':''}`} onClick={() => { if(mkt!==market){setMarket(mkt);setSyncStatus('idle');} }}>
                  <span className="tab-flag">{m.flag}</span>{m.label}<span className="tab-count">{count}</span>
                </button>
              );
            })}
          </div>

          {/* v7.0 Sentiment Card */}
          {(() => {
            const sc = sentiment?.sentiment_score;
            const hasData = sc != null && !sentiment?.error;
            const pct = hasData ? Math.round(((sc + 1) / 2) * 100) : 50;
            const barColor = sc >= 0.2 ? 'var(--green)' : sc <= -0.2 ? 'var(--red)' : 'var(--yellow)';
            const emoji = sc >= 0.5 ? '🚀' : sc >= 0.2 ? '🟢' : sc <= -0.5 ? '🔴' : sc <= -0.2 ? '⚠️' : '🔵';
            const label = sc >= 0.5 ? '極度樂觀' : sc >= 0.2 ? '偏樂觀' : sc <= -0.5 ? '極度悲觀' : sc <= -0.2 ? '偏悲觀' : '市場中性';
            return (
              <div style={{
                background:'var(--bg-1)', border:'1px solid var(--border)', borderRadius:10,
                padding:'10px 14px', marginBottom:8,
                display:'flex', alignItems:'center', gap:12, flexWrap:'wrap',
              }}>
                <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
                  <span style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.07em'}}>市場情緒</span>
                  {sentimentLoading && <span style={{fontSize:11,color:'var(--text-muted)'}}>分析中…</span>}
                  {sentiment?.error === 'no_key' && <span style={{fontSize:11,color:'var(--text-muted)'}}>（需設定 GROK_API_KEY）</span>}
                </div>
                {hasData && (<>
                  <span style={{fontSize:18}}>{emoji}</span>
                  <span style={{fontSize:13,fontWeight:700,color:barColor}}>{label}</span>
                  <div style={{flex:1,minWidth:80,maxWidth:160}}>
                    <div style={{height:6,borderRadius:3,background:'var(--bg-2)',overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${pct}%`,background:barColor,transition:'width 0.4s'}} />
                    </div>
                    <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2,textAlign:'center'}}>
                      {sc >= 0 ? '+' : ''}{sc?.toFixed(2)}
                    </div>
                  </div>
                  <span style={{fontSize:12,color:'var(--text-secondary)',flex:2,minWidth:120}}>{sentiment.key_reason}</span>
                  {sentiment.target_sectors?.length > 0 && (
                    <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                      {sentiment.target_sectors.map(s => (
                        <span key={s} style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:'var(--bg-2)',color:'var(--text-muted)'}}>{s}</span>
                      ))}
                    </div>
                  )}
                  <button onClick={() => {
                    setSentimentLoading(true);
                    fetch(`${API_BASE}/api/sentiment/refresh`, {method:'POST'})
                      .then(r=>r.json()).then(d=>{setSentiment(d);setSentimentLoading(false);})
                      .catch(()=>setSentimentLoading(false));
                  }} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:14,padding:'0 4px'}} title="重新分析">↻</button>
                </>)}

                {/* v9.0 VIX badge (US only) */}
                {market === 'us' && vix?.vix != null && (() => {
                  const v = vix.vix;
                  const vColor = v > 30 ? 'var(--red)' : v > 25 ? '#f97316' : v > 20 ? 'var(--yellow)' : 'var(--green)';
                  const vBg    = v > 30 ? 'rgba(248,113,113,0.12)' : v > 25 ? 'rgba(249,115,22,0.12)' : v > 20 ? 'rgba(251,191,36,0.1)' : 'rgba(52,211,153,0.1)';
                  return (
                    <div style={{display:'flex',alignItems:'center',gap:6,padding:'4px 10px',borderRadius:8,background:vBg,border:`1px solid ${vColor}40`,flexShrink:0}}>
                      <span style={{fontSize:10,fontWeight:700,color:'var(--text-muted)'}}>VIX</span>
                      <span style={{fontSize:14,fontWeight:800,color:vColor}}>{v.toFixed(1)}</span>
                      <span style={{fontSize:11,color:vColor}}>{vix.status}</span>
                    </div>
                  );
                })()}
              </div>
            );
          })()}

          {/* App Nav */}
          <div className="app-nav">
            {[
              { id:'scanner',   icon:'📡', label:'Scanner'   },
              { id:'portfolio', icon:'💼', label:'Portfolio' },
              { id:'backtest',  icon:'🧪', label:'Backtest'  },
              { id:'model',     icon:'🧠', label:'Model'     },
              { id:'history',   icon:'📊', label:'History'   },
              { id:'settings',  icon:'⚙️', label:'Settings'  },
            ].map(t => (
              <button key={t.id} className={`nav-tab ${activeTab===t.id?'active':''}`} onClick={() => setActiveTab(t.id)}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>

          {/* ═══════════════ SCANNER TAB ═══════════════ */}
          {activeTab === 'scanner' && (<>

            {/* v6.0 What's New banner */}
            {showWhatsNew && (
              <div style={{
                background:'linear-gradient(135deg,rgba(88,166,255,0.12),rgba(63,185,80,0.10))',
                border:'1px solid rgba(88,166,255,0.3)', borderRadius:10,

                      ['📊','EPS/營收成長','加入基本面評分'],

                      <span key={title} style={{display:'flex',alignItems:'center',gap:4}}>
                        <span>{icon}</span>

                  cursor:'pointer',fontSize:18,padding:'0 4px',flexShrink:0,lineHeight:1,

              </div>
