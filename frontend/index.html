            {/* Dashboard stats */}
            {lastData.length > 0 && (
              <div className="stats-row">
                <div className={`stat-card clickable ${signalFilter==='buy'?'f-buy':''}`} onClick={() => toggleFilter('buy')} title="Click to filter BUY signals">
                  <div className="stat-val sv-buy">{dsBuy}</div><div className="stat-lbl">Buy Signal {signalFilter==='buy'?'●':''}</div>
                </div>
                <div className={`stat-card clickable ${signalFilter==='sell'?'f-sell':''}`} onClick={() => toggleFilter('sell')} title="Click to filter SELL signals">
                  <div className="stat-val sv-sell">{dsSell}</div><div className="stat-lbl">Sell {signalFilter==='sell'?'●':''}</div>
                </div>
                <div className={`stat-card clickable ${signalFilter==='warn'?'f-warn':''}`} onClick={() => toggleFilter('warn')} title="Click to filter WARNING signals">
                  <div className="stat-val sv-warn">{dsWarn}</div><div className="stat-lbl">Warning {signalFilter==='warn'?'●':''}</div>
                </div>
                <div className="stat-card"><div className="stat-val sv-nodata">{dsNoData}</div><div className="stat-lbl">No Data</div></div>
                <div className="stat-card"><div className="stat-val sv-total">{lastData.length}</div><div className="stat-lbl">Scanned</div></div>
              </div>
            )}

            {/* Watchlist */}
            <div className="card">
              <div className="card-label">{meta.flag} {meta.label} Watchlist — {tickers.length} stock{tickers.length!==1?'s':''}</div>
              <div className="input-row">
                <input className="ticker-input" type="text" placeholder={meta.placeholder} value={newTicker} onChange={e=>setNewTicker(e.target.value)} onKeyDown={onKey} />
                <button className="btn btn-add" onClick={addTicker} disabled={!newTicker.trim()}>Add</button>
                <button className="btn btn-ghost" onClick={reloadFromSheet} title="Reload from Google Sheets">↻ Reload</button>
              </div>
              <div className="chip-list">
                {tickers.length === 0
                  ? <span className="empty">No tickers yet — add one above.</span>
                  : tickers.map(t => (
                      <span key={t} className="chip">{t}
                        <button className="chip-x" onClick={() => removeTicker(t)}>×</button>
                      </span>
                    ))
                }
              </div>
              <div className="import-divider">
                <div className="import-label">⚡ Smart Ticker Import</div>
                <textarea className="import-area"
                  placeholder={"Paste InvestingPro table here to auto-filter undervalued stocks!\n(估值偏低 or 便宜價 = imported; 公允 = skipped)\nOr paste any ticker list — one per line or space-separated."}
                  value={importText} onChange={e=>setImportText(e.target.value)} />
                <div className="import-row">
                  <button className="btn btn-add" onClick={parseImport} disabled={!importText.trim()}>⚡ Import</button>
                  {importText && <button className="btn btn-ghost" onClick={() => setImportText('')}>Clear</button>}
                  {importFeedback && <span className="import-feedback">{importFeedback}</span>}
                </div>
              </div>
            </div>

            {/* Scanner */}
            <div className="card">
              <div className="card-label">{meta.flag} MA20 + Volume Scanner</div>
              <div className="scan-row">
                <button className="btn btn-scan" onClick={runScan} disabled={scanning||autoScanning||!tickers.length}>
                  {scanning ? <><span className="spinner"></span>Scanning…</> : '▶ Run Scan'}
                </button>
                <span className="scan-hint">
                  {tickers.length === 0 ? `Add ${meta.label} tickers first` : `${tickers.length} ticker${tickers.length!==1?'s':''} · 6-condition professional filter`}
                </span>
              </div>
              <div className="cond-label">Signal conditions — click to toggle:</div>
              <div className="cond-grid">
                {condDefs.map(c => (
                  <button key={c.key} className={`cond-pill ${activeConds[c.key]?'on':'off'}`} onClick={() => toggleCond(c.key)} title={c.desc}>
                    {activeConds[c.key]?'✓':'✗'} {c.label}
                  </button>
                ))}
              </div>
              {!isDefaultThresh(thresholds) && <div className="thresh-active-note">⚙️ Custom thresholds active — conditions use your Settings values</div>}
              <div className="token-row">
                <span className="token-label">📲 Telegram Bot Token:</span>
                <input className="token-input" type="password" placeholder="7234567890:AAFxxx..." value={tgBotToken} onChange={e=>setTgBotToken(e.target.value)} />
              </div>
              <div className="token-row">
                <span className="token-label">📲 Telegram Chat ID:</span>
                <input className="token-input" type="text" placeholder="123456789" value={tgChatId} onChange={e=>setTgChatId(e.target.value)} />
              </div>
              <div className="auto-scan-info">🕛 Auto-scan both markets every night at 12:00 AM · next in <strong>{countdown}</strong></div>
              {scanError && <div className="error-box">⚠ {scanError}</div>}
            </div>

            {/* Results */}
            {hasResults && (
              <div className="card">
                <div className="result-header">
                  <div className="card-label" style={{marginBottom:0}}>{meta.flag} Scan Results</div>
                  {currentEntry && !scanning && (
                    <div className="scan-time">
                      Last scanned: {formatScanTime(currentEntry.scannedAt)}
                      {currentEntry.auto && <span className="auto-tag">AUTO</span>}
                    </div>
                  )}
                </div>
                {scanning
                  ? <div className="loading-row"><span className="spinner"></span>Fetching data for {tickersRef.current.length} ticker{tickersRef.current.length!==1?'s':''}…</div>
                  : <>
                      <div className="result-meta">
                        {signalFilter
                          ? <>{displayResults.length} {signalFilter==='buy'?'🟢 BUY':signalFilter==='sell'?'🔴 SELL':'⚠️ WARNING'} stocks · <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--accent)',fontSize:12,padding:0}} onClick={() => setSignalFilter(null)}>✕ show all</button></>
                          : <>{scanResults.length} result{scanResults.length!==1?'s':''}{dsBuy>0&&<> · <span className="buy-count">{dsBuy} buy signal{dsBuy!==1?'s':''} 🚀</span></>}</>
                        }
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                        <button className={`toggle-ext ${showExtended?'active':''}`} onClick={() => setShowExtended(v=>!v)}>
                          {showExtended ? '▲ Less' : '▼ More'} columns
                        </button>
                        {showExtended && <span style={{fontSize:11,color:'var(--text-muted)'}}>距年高 · RS · 週線 · 回撤 · 停損 · 目標 · 形態 · <span style={{color:'var(--accent)'}}>預測EPS / 股息</span></span>}
                      </div>
                      <div className="table-scroll">
                        <table>
                          <thead><tr>
                            <th className="col-s1">Ticker</th><th className="col-s2">Company</th><th>Close</th>
                            <th>RSI</th><th>Bias</th><th>Signal</th>
                            <th>綜合評論</th>
                            {showExtended && <>
                              <th title="Signal confirmed on 2 consecutive days">確認</th>
                              <th title="5-day price return — >5% means extended, risky to chase">5日漲跌</th>
                              <th title="Next earnings date — near=high risk">財報</th>
                              <th title="EPS quarterly growth YoY">EPS成長</th>
                              <th title="Revenue growth YoY">營收成長</th>
                              <th title="8-step forecasted annual EPS (TWD/share) — revenue YTD growth × last-year total × TTM margin ÷ shares">預測EPS</th>
                              <th title="Forecasted cash dividend based on 3-year avg payout ratio × estimated EPS">預測股息</th>
                              <th title="Implied YTD revenue growth used in EPS forecast">預測營收成長</th>
                              <th title="OLS model predicted 10-day return">預測10日</th>
                              <th title="MACD crossover status">MACD</th>
                              <th title="ADX trend strength (>25=trend, <20=chop)">ADX</th>
                              <th title="OBV: rising=accumulation, falling=distribution">OBV</th>
                              <th title="Monthly MA5>MA10 trend">月線</th>
                              <th title="Close above 20-day high = breakout">突破</th>
                              <th title="Volume expanding 3 days above VMA20">量擴</th>
                              <th title="Foreign institutional net buy/sell (TW)">外資</th>
                              <th title="Investment trust net buy/sell (TW)">投信</th>
                              <th title="Distance from 52-week high">距年高</th>
                              <th title="20-day return vs market index">RS</th>
                              <th title="Weekly MA5>MA10>MA20">週線</th>
                              <th title="Max drawdown past 1 year">回撤</th>
                              <th title="Suggested stop loss (MA20×0.97)">停損</th>
                              <th title="Target price (+15%)">目標</th>
                              <th>形態</th>
                            </>}
                            <th></th>
                          </tr></thead>
                          <tbody>
                            {displayResults.map(row => {
                              const noData = row.signal==='NO_DATA'||row.signal==='ERROR';
                              const rowConds = noData ? {} : getCondsForRow(row);
                              return (
                                <tr key={row.ticker} style={noData?{opacity:0.45}:{}}>
                                  <td className="td-code col-s1">
                                    {row.ticker}
                                    <button className="btn-chart" onClick={() => setChartTicker({ticker:row.ticker,market})}>📈</button>
                                  </td>
                                  <td className="td-name col-s2" title={row.companyName||row.ticker}>{row.companyName||row.ticker}</td>
                                  <td className="td-num">{row.close??'—'}</td>
                                  <td className="td-num" style={row.rsi14!=null?{color:row.rsi14>=thresholds.rsiLow&&row.rsi14<=thresholds.rsiHigh?'var(--green)':'inherit'}:{}}>
                                    {row.rsi14!=null?row.rsi14.toFixed(1):'—'}
                                  </td>
                                  <td className="td-num" style={row.bias!=null?{color:row.bias<thresholds.biasPct?'var(--green)':row.bias>thresholds.biasPct*2?'var(--red)':'inherit'}:{}}>
                                    {row.bias!=null?row.bias.toFixed(1)+'%':'—'}
                                  </td>
                                  <td>
                                    {noData
                                      ? <SignalBadge row={row} conds={null} />
                                      : <>
                                          <SignalBadge row={row} conds={rowConds} />
                                          <div className="cond-dots">
                                            {condDefs.map(c => (
                                              <span key={c.key}
                                                className={`cdot ${!activeConds[c.key]?'cdot-off':rowConds[c.key]?'cdot-pass':'cdot-fail'}`}
                                                title={`${c.label}: ${!activeConds[c.key]?'off':rowConds[c.key]?'✓':'✗'}`}
                                              />
                                            ))}
                                          </div>
                                        </>
                                    }
                                  </td>
                                  <td>
                                    {(() => {
                                      const ov = computeOverall(row, noData ? null : rowConds, sentiment?.sentiment_score ?? null, market === 'us' ? vix : null);
                                      if (!ov) return <span className="overall-reasons">—</span>;
                                      return (
                                        <div className="overall-cell"
                                          onMouseEnter={(e) => {
                                            const r = e.currentTarget.getBoundingClientRect();
                                            setTooltip({row, conds: rowConds, ov, x: r.right + 8, y: r.top});
                                          }}
                                          onMouseLeave={() => setTooltip(null)}>
                                          <span className="overall-label" style={{color:ov.color, background:ov.bg}}>{ov.label}</span>
                                          {ov.reasons && <span className="overall-reasons">{ov.reasons}</span>}
                                        </div>
                                      );
                                    })()}
                                  </td>
                                  {showExtended && (()=>{
                                    const pred = row.predicted_return != null ? row.predicted_return : computePredictedReturn(row, regCoeffs);
                                    return (<>
                                    {/* v6: confirmed signal */}
                                    <td style={{textAlign:'center'}}>
                                      {row.confirmed_signal
                                        ? <span style={{color:'var(--green)',fontWeight:800,fontSize:14}}>✅</span>
                                        : <span style={{color:'var(--text-muted)',fontSize:11}}>—</span>}
                                    </td>
                                    {/* v6: 5-day return */}
                                    <td className="td-num" style={{fontWeight:600, color:row.week5d_return==null?'inherit':row.is_extended?'var(--red)':row.week5d_return>0?'var(--green)':'var(--red)'}}>
                                      {row.week5d_return!=null
                                        ? <span title={row.is_extended?'⚠️ 已延伸，慎追':''}>{(row.week5d_return>0?'+':'')+row.week5d_return.toFixed(1)+'%'}{row.is_extended?' ⚠️':''}</span>
                                        : '—'}
                                    </td>
                                    {/* v6: earnings */}
                                    <td style={{textAlign:'center',fontSize:11}}>
                                      {row.earnings_date
                                        ? <span style={{color:row.near_earnings?'var(--red)':'var(--text-muted)',fontWeight:row.near_earnings?700:400}}
                                            title={row.near_earnings?'⚠️ 財報即將！高風險':'下次財報日'}>
                                            {row.near_earnings?'⚠️ ':''}{row.earnings_date}
                                          </span>
                                        : <span style={{color:'var(--text-muted)'}}>—</span>}
                                    </td>
                                    {/* v6: EPS growth */}
                                    <td className="td-num" style={{color:row.eps_growth==null?'inherit':row.eps_growth>20?'var(--green)':row.eps_growth>0?'#8bc34a':row.eps_growth<-10?'var(--red)':'var(--yellow)',fontWeight:600}}>
                                      {row.eps_growth!=null ? (row.eps_growth>0?'+':'')+row.eps_growth.toFixed(1)+'%' : '—'}
                                    </td>
                                    {/* v6: revenue growth */}
                                    <td className="td-num" style={{color:row.revenue_growth==null?'inherit':row.revenue_growth>10?'var(--green)':row.revenue_growth<0?'var(--red)':'var(--text-muted)',fontWeight:600}}>
                                      {row.revenue_growth!=null ? (row.revenue_growth>0?'+':'')+row.revenue_growth.toFixed(1)+'%' : '—'}
                                    </td>
                                    {/* 8-step forecasted EPS */}
                                    <td className="td-num" style={{fontWeight:700, color:row.est_eps==null?'var(--text-muted)':row.est_eps>0?'var(--green)':'var(--red)'}}>
                                      {row.est_eps!=null ? row.est_eps.toFixed(2) : '—'}
                                    </td>
                                    {/* 8-step forecasted dividend */}
                                    <td className="td-num" style={{fontWeight:600, color:row.est_dividend==null?'var(--text-muted)':row.est_dividend>0?'#8bc34a':'inherit'}}>
                                      {row.est_dividend!=null ? row.est_dividend.toFixed(2) : '—'}
                                    </td>
                                    {/* implied YTD revenue growth for forecast */}
                                    <td className="td-num" style={{color:row.est_rev_growth==null?'var(--text-muted)':row.est_rev_growth>10?'var(--green)':row.est_rev_growth<0?'var(--red)':'var(--yellow)'}}>
                                      {row.est_rev_growth!=null ? (row.est_rev_growth>0?'+':'')+row.est_rev_growth.toFixed(1)+'%' : '—'}
                                    </td>
                                    {/* v5 predicted return */}
                                    <td className="td-num" style={{fontWeight:700, color: pred==null?'var(--text-muted)':pred>=2?'var(--green)':pred<=-2?'var(--red)':'var(--yellow)'}}>
                                      {pred!=null ? (pred>0?'+':'')+pred.toFixed(1)+'%' : '—'}
                                    </td>
                                    {/* v4 new columns */}
                                    <td>
                                      {row.macd_cross==='golden' ? <span style={{color:'var(--green)',fontWeight:700,fontSize:11}}>黃金✓</span>
                                       :row.macd_cross==='death'  ? <span style={{color:'var(--red)',fontWeight:700,fontSize:11}}>死亡✗</span>
                                       :row.macd_cross==='above'  ? <span style={{color:'var(--green)',fontSize:11}}>↑多</span>
                                       :row.macd_cross==='below'  ? <span style={{color:'var(--red)',fontSize:11}}>↓空</span>
                                       :'—'}
                                    </td>
                                    <td className="td-num" style={row.adx14!=null?{color:row.adx14>30?'var(--green)':row.adx14<20?'var(--text-muted)':'inherit'}:{}}>
                                      {row.adx14!=null?row.adx14.toFixed(0):'—'}
                                    </td>
                                    <td>
                                      {row.obv_trend==='rising'  ? <span style={{color:'var(--green)',fontSize:11,fontWeight:700}}>↑吸籌</span>
                                       :row.obv_trend==='falling' ? <span style={{color:'var(--red)',fontSize:11,fontWeight:700}}>↓出貨</span>
                                       :'—'}
                                    </td>
                                    <td>
                                      {row.monthly_trend===true  ? <span style={{color:'var(--green)',fontSize:11,fontWeight:700}}>↑月強</span>
                                       :row.monthly_trend===false ? <span style={{color:'var(--red)',fontSize:11,fontWeight:700}}>↓月弱</span>
                                       :<span style={{color:'var(--text-muted)',fontSize:11}}>—</span>}
                                    </td>
                                    <td style={{textAlign:'center'}}>
                                      {row.is_breakout20 ? <span style={{color:'var(--green)',fontWeight:700,fontSize:12}}>🚀</span> : <span style={{color:'var(--text-muted)',fontSize:11}}>—</span>}
                                    </td>
                                    <td style={{textAlign:'center'}}>
                                      {row.vol_expansion ? <span style={{color:'var(--green)',fontWeight:700,fontSize:12}}>📈</span> : <span style={{color:'var(--text-muted)',fontSize:11}}>—</span>}
                                    </td>
                                    <td className="td-num" style={row.inst_foreign!=null?{color:row.inst_foreign>0?'var(--green)':row.inst_foreign<0?'var(--red)':'inherit',fontWeight:600}:{}}>
                                      {row.inst_foreign!=null?(row.inst_foreign>0?'+':'')+row.inst_foreign.toLocaleString():'—'}
                                    </td>
                                    <td className="td-num" style={row.inst_trust!=null?{color:row.inst_trust>0?'var(--green)':row.inst_trust<0?'var(--red)':'inherit',fontWeight:600}:{}}>
                                      {row.inst_trust!=null?(row.inst_trust>0?'+':'')+row.inst_trust.toLocaleString():'—'}
                                    </td>
                                    {/* v3 columns */}
                                    <td className="td-num" style={row.pct_from_52high!=null?{color:row.pct_from_52high>-5?'var(--green)':row.pct_from_52high<-20?'var(--red)':'inherit'}:{}}>
                                      {row.pct_from_52high!=null?row.pct_from_52high.toFixed(1)+'%':'—'}
                                    </td>
                                    <td className="td-num">
                                      {row.rs_score!=null
                                        ? <span className={row.rs_score>1.2?'rs-pos':row.rs_score<0.8?'rs-neg':'rs-neu'}>{row.rs_score.toFixed(2)}</span>
                                        : '—'}
                                    </td>
                                    <td>
                                      {row.weekly_trend===true  ? <span className="weekly-up">↑週強</span>
                                       :row.weekly_trend===false ? <span className="weekly-down">↓週弱</span>
                                       :<span className="weekly-na">—</span>}
                                    </td>
                                    <td className="td-num" style={row.max_drawdown_1y!=null?{color:row.max_drawdown_1y<-30?'var(--red)':row.max_drawdown_1y>-10?'var(--green)':'inherit'}:{}}>
                                      {row.max_drawdown_1y!=null?row.max_drawdown_1y.toFixed(1)+'%':'—'}
                                    </td>
                                    <td className="td-num" style={{color:'var(--red)'}}>{row.stop_loss??'—'}</td>
                                    <td className="td-num" style={{color:'var(--green)'}}>{row.target_price??'—'}</td>
                                    <td><PatternBadge pattern={row.pattern} /></td>
                                  </>);})()}
                                  <td>
                                    <button className="btn-row-remove" onClick={() => removeFromScan(row.ticker)} title={`Remove ${row.ticker}`}>×</button>
                                  </td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    </>
                }
              </div>
            )}

            {/* Sector Heat */}
            {sectorHeat.length > 0 && (
              <div className="card" style={{marginTop:4}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                  <div className="card-label" style={{margin:0}}>🔥 族群熱度 — Buy Signal Distribution</div>
                  <button
                    onClick={() => setSectorFilterOn(v=>!v)}
                    style={{
                      marginLeft:'auto', fontSize:11, fontWeight:700, padding:'3px 10px',
                      borderRadius:6, border:`1px solid ${sectorFilterOn ? 'rgba(52,211,153,0.4)' : 'var(--border)'}`,
                      background: sectorFilterOn ? 'rgba(52,211,153,0.12)' : 'transparent',
                      color: sectorFilterOn ? 'var(--green)' : 'var(--text-muted)', cursor:'pointer',
                    }}
                    title="只顯示熱度>50%的族群個股">
                    {sectorFilterOn ? '✅ 族群過濾開啟' : '族群過濾'}
                  </button>
                </div>
                <div className="sector-grid">
                  {sectorHeat.map(s => (
                    <div key={s.name} className={`sector-card ${sectorFilterOn && s.rate >= 0.5 ? 'sector-hot' : ''}`}>
                      <div className="sector-name">{s.name}</div>
                      <div className="sector-bar-wrap">
                        <div className="sector-bar" style={{width:`${s.rate*100}%`, background: s.rate >= 0.5 ? 'var(--green)' : undefined}}></div>
                      </div>
                      <div className="sector-stats">
                        <span className="sector-buy">▲ {s.buy} buy</span>
                        <span className="sector-total">/ {s.total}</span>
                        {s.rate >= 0.5 && <span style={{color:'var(--green)',fontSize:10,fontWeight:700}}>🔥 熱</span>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* App Guide — bottom of Scanner */}

                  <input type="date" className="sm-in" value={btStartDate} onChange={e=>setBtStartDate(e.target.value)} style={{width:140}} />
                </div>
                <div>
                  <div style={{fontSize:11,color:'var(--text-muted)',fontWeight:700,marginBottom:4}}>結束日期</div>
                  <input type="date" className="sm-in" value={btEndDate} onChange={e=>setBtEndDate(e.target.value)} style={{width:140}} />
                </div>
                <div>
                  <div style={{fontSize:11,color:'var(--text-muted)',fontWeight:700,marginBottom:4}}>持有天數</div>
                  <div style={{display:'flex',gap:4}}>
                    {[5,10,20].map(d=>(
                      <button key={d} className={`btn ${btHoldDays===d?'btn-add':'btn-ghost'}`}
                              style={{minWidth:42,padding:'5px 10px',fontSize:12}}
                              onClick={()=>setBtHoldDays(d)}>{d}日</button>
                    ))}
                  </div>
                </div>
              </div>

              {/* Ticker chips */}
              <div style={{fontSize:11,color:'var(--text-muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:6}}>選擇標的</div>
              <div className="bt-ticker-sel">
                {tickers.length === 0
                  ? <span style={{color:'var(--text-muted)',fontSize:13}}>Watchlist 無標的，請先在 Scanner 頁面新增。</span>
                  : tickers.map(t=>(
                      <span key={t} className={`bt-chip ${btSelected.includes(t)?'sel':''}`} onClick={()=>toggleBtTicker(t)}>
                        {t.replace('.TW','')}
                      </span>
                    ))
                }
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:16}}>
                <button className="btn btn-add" onClick={runBacktest} disabled={!btSelected.length||btLoading}>
                  {btLoading ? <><span className="spinner"></span>回測中…</> : `▶ 開始回測 (${btSelected.length}支)`}
                </button>
                {btSelected.length>0 && <button className="btn btn-ghost" onClick={()=>setBtSelected([])}>清除</button>}
                <button className="btn btn-ghost" onClick={()=>setBtSelected([...tickers])}>全選</button>
              </div>

              {btError && <div className="error-box">⚠ {btError}</div>}

              {/* Overall summary */}
              {btSummary && btSummary.total_signals>0 && (
                <div style={{background:'rgba(88,166,255,0.06)',border:'1px solid rgba(88,166,255,0.2)',borderRadius:10,padding:'14px 18px',marginBottom:20}}>
                  <div style={{fontSize:11,color:'var(--text-muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:10}}>
                    整體摘要 · {btSummary.start_date} → {btSummary.end_date} · 持有{btSummary.hold_days}日
                  </div>
                  <div className="bt-summary">
                    {[
                      {val: btSummary.win_rate!=null?(btSummary.win_rate*100).toFixed(1)+'%':'—', lbl:'整體勝率', color: btSummary.win_rate>=0.6?'bt-win':btSummary.win_rate<0.4?'bt-lose':'bt-neu'},
                      {val: btSummary.avg_return!=null?(btSummary.avg_return>0?'+':'')+btSummary.avg_return.toFixed(2)+'%':'—', lbl:'平均報酬', color:btSummary.avg_return>0?'bt-win':btSummary.avg_return<0?'bt-lose':'bt-neu'},
                      {val: btSummary.total_signals, lbl:'訊號總次數', color:'bt-neu'},
                      {val: btSummary.sharpe!=null?btSummary.sharpe.toFixed(2):'—', lbl:'Sharpe Ratio', color:btSummary.sharpe>1?'bt-win':btSummary.sharpe>0?'bt-neu':'bt-lose'},
                    ].map((s,i)=>(
                      <div key={i} className="bt-stat">
                        <div className={`bt-val ${s.color}`}>{s.val}</div>
                        <div className="bt-lbl">{s.lbl}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* ── Condition Analysis (Direction C) ── */}
              {btAnalysis && btAnalysis.total_analyzed >= 5 && (
                <div style={{marginBottom:24}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
                    <span style={{fontSize:14,fontWeight:700,color:'var(--text-primary)'}}>🔬 指標條件分析</span>
                    <span style={{fontSize:11,color:'var(--text-muted)'}}>共 {btAnalysis.total_analyzed} 筆訊號 — 哪個數值區間勝率最高？</span>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(340px,1fr))',gap:12,marginBottom:14}}>
                    {[
                      {title:'RSI 入場值', sub:'入場時的 RSI14 落在哪個區間？',       buckets: btAnalysis.rsi_buckets},
                      {title:'ADX 趨勢強度', sub:'入場時趨勢有多強？',                  buckets: btAnalysis.adx_buckets},
                      {title:'Bias 偏離MA20', sub:'入場時股價與MA20的距離',             buckets: btAnalysis.bias_buckets},
                      {title:'MACD Histogram', sub:'MACD動能強弱（三等分）',            buckets: btAnalysis.macd_h_buckets},
                    ].filter(g => g.buckets && g.buckets.length > 0).map(group => {
                      const valid = group.buckets.filter(b => b.count > 0 && b.win_rate != null);
                      const bestWR = valid.length ? Math.max(...valid.map(b => b.win_rate)) : -1;
                      return (
                        <div key={group.title} style={{background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:10,padding:'13px 15px'}}>
                          <div style={{marginBottom:10}}>
                            <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',color:'var(--text-muted)'}}>{group.title}</div>
                            <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2,opacity:0.7}}>{group.sub}</div>
                          </div>
                          {group.buckets.map((b, i) => {
                            const wr = b.win_rate;
                            const barClr = wr == null ? '#333' : wr >= 0.6 ? 'var(--green)' : wr >= 0.4 ? 'var(--yellow)' : 'var(--red)';
                            const isBest = wr != null && wr === bestWR && b.count >= 2;
                            return (
                              <div key={i} style={{marginBottom:9}}>
                                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
                                  <span style={{fontSize:11,color:'var(--text-secondary)',flex:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{b.label}</span>
                                  {isBest && <span style={{fontSize:9,background:'rgba(88,166,255,0.2)',color:'var(--accent)',borderRadius:3,padding:'1px 5px',fontWeight:800,flexShrink:0}}>BEST</span>}
                                  <span style={{fontSize:10,color:'var(--text-muted)',flexShrink:0}}>{b.count}筆</span>
                                </div>
                                <div style={{display:'flex',alignItems:'center',gap:8}}>
                                  <div style={{flex:1,background:'var(--bg-0)',borderRadius:3,height:8,overflow:'hidden'}}>
                                    <div style={{width:`${(wr||0)*100}%`,height:'100%',background:barClr,borderRadius:3,transition:'width 0.6s ease'}}/>
                                  </div>
                                  <span style={{fontSize:12,fontWeight:700,color:barClr,width:36,textAlign:'right',flexShrink:0}}>
                                    {wr != null ? Math.round(wr*100)+'%' : '—'}
                                  </span>
                                  <span style={{fontSize:12,fontWeight:700,width:54,textAlign:'right',flexShrink:0,color:b.avg_return>0?'var(--green)':b.avg_return<0?'var(--red)':'var(--text-muted)'}}>
                                    {b.avg_return != null ? (b.avg_return>0?'+':'')+b.avg_return.toFixed(1)+'%' : '—'}
                                  </span>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      );
                    })}
                  </div>
                  <div style={{padding:'10px 14px',background:'rgba(88,166,255,0.04)',border:'1px solid rgba(88,166,255,0.14)',borderRadius:8,fontSize:12,color:'var(--text-secondary)',lineHeight:1.6}}>
                    💡 <strong style={{color:'var(--text-primary)'}}>怎麼看：</strong>
                    BEST 標記的 bucket = 歷史勝率最高的指標區間。若某個 bucket 明顯優於其他（差距 ≥ 10%），代表可以<strong style={{color:'var(--accent)'}}>收緊該指標的篩選範圍</strong>來提高訊號品質。下一步用 Grid Search（方向 A）驗證是否真的能提升 Sharpe。
                  </div>
                </div>
              )}

              {/* ── Grid Search (Direction A) ── */}
              <div style={{marginBottom:24,paddingTop:4}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                  <span style={{fontSize:14,fontWeight:700,color:'var(--text-primary)'}}>🔍 Grid Search 最優參數</span>
                  <span style={{fontSize:11,color:'var(--text-muted)'}}>
                    自動測試 RSI × ADX × MACD_H × Bias 的所有組合
                    {gsResults && <span style={{marginLeft:8,color:'var(--accent)'}}>({gsResults.market==='tw'?'🇹🇼 台股':'🇺🇸 美股'} 參數集)</span>}
                  </span>
                </div>
                <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:12,flexWrap:'wrap'}}>
                  <button className="btn btn-ghost" onClick={runGridSearch} disabled={!btSelected.length||gsLoading}
                          style={{fontSize:12,padding:'6px 14px',borderColor:'rgba(88,166,255,0.4)',color:'var(--accent)'}}>
                    {gsLoading ? <><span className="spinner"></span>搜尋中…（約 60 秒）</> : '▶ 開始 Grid Search'}
                  </button>
                  {gsResults && <span style={{fontSize:11,color:'var(--text-muted)'}}>
                    測試 {gsResults.combos_tested} 組參數 · 候選訊號 {gsResults.total_candidates} 筆
                    {gsResults.current_rank && <span style={{color:'var(--accent)',marginLeft:8}}>現行參數排名第 #{gsResults.current_rank}</span>}
                  </span>}
                </div>
                {gsError && <div className="error-box">⚠ {gsError}</div>}

                {gsResults && gsResults.top_results && (
                  <div style={{overflowX:'auto'}}>
                    <table style={{width:'100%',fontSize:12,borderCollapse:'collapse',minWidth:620}}>
                      <thead>
                        <tr style={{background:'var(--bg-2)'}}>
                          {['#','RSI 範圍','ADX 範圍','MACD_H 最低%','Bias 範圍','訊號數','勝率','平均報酬','Sharpe',''].map((h,i)=>(
                            <th key={i} style={{padding:'7px 10px',textAlign:i>=5?'right':'left',fontSize:10,
                              fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',
                              color:'var(--text-muted)',borderBottom:'2px solid var(--border)',whiteSpace:'nowrap'}}>
                              {h}
                            </th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {gsResults.top_results.map((row, i) => {
                          const p = row.params;
                          const isCurrent = gsResults.current_rank === i+1;
                          const isBest = i === 0;
                          const rowBg = isBest ? 'rgba(63,185,80,0.06)' : isCurrent ? 'rgba(88,166,255,0.06)' : i%2===0 ? 'var(--bg-2)' : 'transparent';
                          return (
                            <tr key={i} style={{background:rowBg,borderBottom:'1px solid var(--border)'}}>
                              <td style={{padding:'7px 10px',fontWeight:700,color:isBest?'var(--green)':'var(--text-muted)',fontFamily:'monospace'}}>
                                {isBest?'🏆':i+1}
                              </td>
                              <td style={{padding:'7px 10px',fontFamily:'monospace',whiteSpace:'nowrap',color:'var(--text-secondary)'}}>
                                {p.rsi_lo}–{p.rsi_hi}
                              </td>
                              <td style={{padding:'7px 10px',fontFamily:'monospace',whiteSpace:'nowrap',color:'var(--text-secondary)'}}>
                                {p.adx_lo}–{p.adx_hi}
                              </td>
                              <td style={{padding:'7px 10px',textAlign:'right',fontFamily:'monospace',color:'var(--text-secondary)'}}>
                                ≥{p.macd_h_pct_min}%
                              </td>
                              <td style={{padding:'7px 10px',textAlign:'right',fontFamily:'monospace',color:(p.bias_lo||0)>0?'var(--yellow)':'var(--text-muted)'}}>
                                {(p.bias_lo||0)>0||p.bias_hi?`${p.bias_lo||0}–${p.bias_hi||8}%`:'—'}
                              </td>
                              <td style={{padding:'7px 10px',textAlign:'right',color:'var(--text-muted)'}}>{row.n_signals}</td>
                              <td style={{padding:'7px 10px',textAlign:'right',fontWeight:700,
                                color:row.win_rate>=0.85?'#58e6b0':row.win_rate>=0.75?'var(--green)':row.win_rate>=0.65?'var(--yellow)':'var(--red)'}}>
                                {(row.win_rate*100).toFixed(0)}%
                              </td>
                              <td style={{padding:'7px 10px',textAlign:'right',fontWeight:700,
                                color:row.avg_return>0?'var(--green)':'var(--red)'}}>
                                {row.avg_return>0?'+':''}{row.avg_return?.toFixed(1)}%
                              </td>
                              <td style={{padding:'7px 10px',textAlign:'right',fontWeight:700,
                                color:row.sharpe>1.5?'var(--green)':row.sharpe>0.8?'var(--yellow)':'var(--red)'}}>
                                {row.sharpe?.toFixed(2)??'—'}
                              </td>
                              <td style={{padding:'7px 10px',textAlign:'center'}}>
                                {isCurrent && <span style={{fontSize:9,background:'rgba(88,166,255,0.2)',color:'var(--accent)',borderRadius:3,padding:'2px 5px',fontWeight:700}}>NOW</span>}
                                {isBest && <span style={{fontSize:9,background:'rgba(63,185,80,0.2)',color:'var(--green)',borderRadius:3,padding:'2px 5px',fontWeight:700}}>BEST</span>}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                    <div style={{fontSize:11,color:'var(--text-muted)',marginTop:8,lineHeight:1.5}}>
                      💡 BEST = Sharpe 最高組合。NOW = 現行參數位置。若 BEST 與 NOW 差距 ≥ 0.2 Sharpe，考慮更新參數。
                    </div>
                  </div>
                )}
              </div>

              {/* Per-ticker results */}
              {backtestResults.length>0 && backtestResults.map(res=>(
                <div key={res.ticker} style={{marginBottom:20,paddingBottom:20,borderBottom:'1px solid var(--border)'}}>
                  <div style={{display:'flex',alignItems:'baseline',gap:10,marginBottom:10}}>
                    <span style={{fontSize:15,fontWeight:700,color:'var(--accent)',fontFamily:'monospace'}}>{res.ticker}</span>
                    <span style={{fontSize:13,color:'var(--text-muted)'}}>{res.company_name}</span>
                    {res.error && <span style={{color:'var(--red)',fontSize:12}}>⚠ {res.error}</span>}
                  </div>
                  {res.total_signals===0 && !res.error && (
                    <div style={{color:'var(--text-muted)',fontSize:13}}>此期間無符合條件的買進訊號。</div>
                  )}
                  {res.total_signals>0 && <>
                    <div className="bt-summary">
                      {[
                        {val:(res.win_rate*100).toFixed(1)+'%',         lbl:'勝率',    color:res.win_rate>=0.6?'bt-win':res.win_rate<0.4?'bt-lose':'bt-neu'},
                        {val:(res.avg_return>=0?'+':'')+res.avg_return?.toFixed(2)+'%', lbl:'平均報酬', color:res.avg_return>=0?'bt-win':'bt-lose'},
                        {val:res.avg_win!=null?('+'+res.avg_win.toFixed(2)+'%'):'—',  lbl:'平均獲利', color:'bt-win'},
                        {val:res.avg_loss!=null?res.avg_loss.toFixed(2)+'%':'—',      lbl:'平均虧損', color:'bt-lose'},
                        {val:res.total_signals,                                        lbl:'訊號次數', color:'bt-neu'},
                        {val:res.sharpe!=null?res.sharpe.toFixed(2):'—',              lbl:'Sharpe',  color:res.sharpe>1?'bt-win':res.sharpe>0?'bt-neu':'bt-lose'},
                      ].map((s,i)=>(
                        <div key={i} className="bt-stat">
                          <div className={`bt-val ${s.color}`}>{s.val}</div>
                          <div className="bt-lbl">{s.lbl}</div>
                        </div>
                      ))}
                    </div>

                    <button className="btn btn-ghost" style={{fontSize:11,padding:'3px 10px',marginBottom:8}}
                            onClick={()=>setBtExpandedRow(prev=>prev===res.ticker?null:res.ticker)}>
                      {btExpandedRow===res.ticker?'▲ 收起':'▼ 展開全部訊號 ('+res.signals.length+'筆)'}
                    </button>

                    {btExpandedRow===res.ticker && (
                      <div style={{overflowX:'auto'}}>
                        <table style={{width:'100%',fontSize:12,borderCollapse:'collapse'}}>
                          <thead>
                            <tr style={{color:'var(--text-muted)',fontSize:10,textTransform:'uppercase',letterSpacing:'0.05em'}}>
                              <th style={{padding:'4px 8px',textAlign:'left',fontWeight:600}}>日期</th>
                              <th style={{padding:'4px 8px',textAlign:'right',fontWeight:600}}>進場</th>
                              <th style={{padding:'4px 8px',textAlign:'right',fontWeight:600}}>出場</th>
                              <th style={{padding:'4px 8px',textAlign:'right',fontWeight:600}}>報酬</th>
                              <th style={{padding:'4px 8px',textAlign:'right',fontWeight:600}}>最大回撤</th>
                              <th style={{padding:'4px 8px',textAlign:'right',fontWeight:600}}>RSI</th>
                              <th style={{padding:'4px 8px',textAlign:'right',fontWeight:600}}>ADX</th>
                              <th style={{padding:'4px 8px',textAlign:'center',fontWeight:600}}>結果</th>
                            </tr>
                          </thead>
                          <tbody>
                            {[...res.signals].reverse().map((s,i)=>(
                              <tr key={i} style={{borderBottom:'1px solid var(--border)',background:i%2===0?'var(--bg-2)':'transparent'}}>
                                <td style={{padding:'5px 8px',color:'var(--text-muted)',fontFamily:'monospace',fontSize:11}}>{s.date}</td>
                                <td style={{padding:'5px 8px',textAlign:'right',fontFamily:'monospace'}}>{s.entry_price}</td>
                                <td style={{padding:'5px 8px',textAlign:'right',fontFamily:'monospace'}}>{s.exit_price}</td>
                                <td style={{padding:'5px 8px',textAlign:'right',fontWeight:700,color:s.return_pct>=0?'var(--green)':'var(--red)'}}>
                                  {s.return_pct>=0?'+':''}{s.return_pct?.toFixed(2)}%
                                </td>
                                <td style={{padding:'5px 8px',textAlign:'right',color:'var(--red)',fontSize:11}}>{s.max_dd?.toFixed(2)}%</td>
                                <td style={{padding:'5px 8px',textAlign:'right',color:'var(--text-secondary)'}}>{s.rsi14??'—'}</td>
                                <td style={{padding:'5px 8px',textAlign:'right',color:'var(--text-secondary)'}}>{s.adx14??'—'}</td>
                                <td style={{padding:'5px 8px',textAlign:'center',fontSize:14}}>{s.won?'✅':'❌'}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </>}
                </div>
              ))}

              {!btLoading && backtestResults.length===0 && !btError && (
                <div className="bt-empty">
                  選擇標的後點擊「開始回測」查看歷史訊號績效。
                  <br/><span style={{fontSize:11,color:'var(--text-muted)'}}>使用 FinMind 真實歷史日線，並非模擬估算。每支股票約需 5-10 秒。</span>
                </div>
              )}
            </div>
          )}

          {/* ═══════════════ MODEL TAB ═══════════════ */}
          {activeTab === 'model' && (
            <div>
              <div className="tab-section-title" style={{marginBottom:4}}>🧠 自適應回歸模型</div>
              <p style={{fontSize:13,color:'var(--text-muted)',marginBottom:20}}>
                每次掃描自動記錄所有指標數據。10天後對照實際漲跌，用 OLS 多因子回歸找出哪些指標最有預測力，動態調整各指標權重。
              </p>

              {/* Status card */}
              {regCoeffs && regCoeffs.status === 'ok' ? (
                <div className="card" style={{marginBottom:16,display:'flex',gap:24,flexWrap:'wrap',alignItems:'center'}}>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:28,fontWeight:800,color:regCoeffs.r2>0.3?'var(--green)':regCoeffs.r2>0.1?'var(--yellow)':'var(--text-muted)'}}>
                      {(regCoeffs.r2*100).toFixed(1)}%
                    </div>
                    <div style={{fontSize:11,color:'var(--text-muted)'}}>模型 R²</div>
                  </div>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:28,fontWeight:800,color:'var(--accent)'}}>{regCoeffs.n_samples}</div>
                    <div style={{fontSize:11,color:'var(--text-muted)'}}>訓練樣本數</div>
                  </div>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:14,fontWeight:600,color:'var(--text-primary)'}}>{regCoeffs.updated||'—'}</div>
                    <div style={{fontSize:11,color:'var(--text-muted)'}}>最後訓練時間</div>
                  </div>
                  <div style={{marginLeft:'auto',fontSize:12,color:'var(--text-muted)',maxWidth:220}}>
                    {regCoeffs.r2 > 0.3 ? '模型預測力強，預測值可信。' :
                     regCoeffs.r2 > 0.1 ? '模型有一定參考價值，持續累積數據會更準。' :
                     '數據量還不足，繼續每日掃描以提升準確率。'}
                  </div>
                </div>
              ) : (
                <div className="card" style={{marginBottom:16,textAlign:'center',padding:32,color:'var(--text-muted)'}}>
                  <div style={{fontSize:36,marginBottom:8}}>📊</div>
                  <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>模型尚未訓練</div>
                  <div style={{fontSize:12}}>每次掃描會自動記錄數據。累積 20+ 筆（約20天）後即可開始訓練。</div>
                </div>
              )}

              {/* Train button */}
              <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:20}}>
                <button className="btn-primary" onClick={trainModel} disabled={regLoading} style={{minWidth:140}}>
                  {regLoading ? '⏳ 訓練中...' : '🔄 訓練模型'}
                </button>
                {regStatus && <span style={{fontSize:13,color:regStatus.startsWith('✅')?'var(--green)':regStatus.startsWith('❌')?'var(--red)':'var(--yellow)'}}>{regStatus}</span>}
              </div>

              {/* Feature importance chart */}
              {regCoeffs && regCoeffs.status === 'ok' && regCoeffs.feature_names && (()=>{
                const names = regCoeffs.feature_names;

                      const label = FEAT_LABELS[name] || name;
                      return (

          {/* Stock Detail Tooltip */}
          {tooltip && (() => {
            const {row, conds, ov} = tooltip;
            const condLabels = [
              {key:'price',  label:'Close > MA20'},
              {key:'volume', label:'量 > 1.2×均量'},
              {key:'trend',  label:'月線多頭排列'},
              {key:'candle', label:'陽線實體'},
              {key:'rsi',    label:'RSI 52–60'},
              {key:'bias',   label:'Bias 4–8%'},
            ];
            const isBuy = row.signal === 'YES';
            const macdH = row.macd_h_strong != null ? (row.macd_h_strong ? '✅ ≥60th pct' : '❌ 偏弱') : '—';
            const adxOk = row.adx14 != null ? (18 <= row.adx14 && row.adx14 <= 35 ? '✅ ' + row.adx14?.toFixed(0) : '❌ ' + row.adx14?.toFixed(0)) : '—';
            // smart positioning — keep within viewport
            const vpW = window.innerWidth, vpH = window.innerHeight;
            const ttW = 380, ttH = 500;
            let left = tooltip.x, top = tooltip.y;
            if (left + ttW > vpW - 8) left = tooltip.x - ttW - 320;
            if (top + ttH > vpH - 8) top = vpH - ttH - 8;
            return (
              <div className="stock-tooltip" style={{left, top}}>
                <div className="tt-title">
                  <span style={{color:ov.color}}>{ov.label}</span>
                  <span style={{fontSize:12,color:'var(--text-muted)',fontWeight:400}}>{row.ticker?.replace('.TW','').replace('.TWO','')} {row.company}</span>
                  <span style={{marginLeft:'auto',fontSize:11,color:'var(--text-muted)'}}>綜合分析</span>
                </div>

                {/* 基本數據 */}
                <div className="tt-section-label">基本數據</div>
                <div className="tt-grid">
                  <div className="tt-kv"><div className="tt-k">收盤價</div><div className="tt-v">{row.close?.toFixed(1) ?? '—'}</div></div>
                  <div className="tt-kv"><div className="tt-k">RSI14</div><div className="tt-v" style={{color: row.rsi14>=52&&row.rsi14<=60?'var(--green)':row.rsi14>70?'var(--red)':'inherit'}}>{row.rsi14?.toFixed(1) ?? '—'}</div></div>
                  <div className="tt-kv"><div className="tt-k">Bias</div><div className="tt-v" style={{color: row.bias>=4&&row.bias<=8?'var(--green)':row.bias>8?'var(--red)':'inherit'}}>{row.bias?.toFixed(1) ?? '—'}%</div></div>
                  <div className="tt-kv"><div className="tt-k">ADX14</div><div className="tt-v" style={{color: row.adx14>=18&&row.adx14<=35?'var(--green)':'var(--red)'}}>{row.adx14?.toFixed(0) ?? '—'}</div></div>
                  <div className="tt-kv"><div className="tt-k">MACD_H</div><div className="tt-v">{macdH}</div></div>
                  <div className="tt-kv"><div className="tt-k">訊號</div><div className="tt-v" style={{color:isBuy?'var(--green)':'var(--text-muted)'}}>{isBuy ? '▲ BUY' : '—'}</div></div>
                </div>

                {/* 停損 / 目標 */}
                {(row.stop_loss || row.target_price) && (() => {
                  const sl = row.stop_loss;
                  const tp = row.target_price;
                  const price = row.close;
                  const riskPct  = price && sl ? ((sl - price) / price * 100).toFixed(1) : null;
                  const rewardPct= price && tp ? ((tp - price) / price * 100).toFixed(1) : null;
                  const rr = riskPct && rewardPct ? (Math.abs(parseFloat(rewardPct)) / Math.abs(parseFloat(riskPct))).toFixed(1) : null;
                  return (
                    <div className="tt-section">
                      <div className="tt-section-label">停損 / 目標價</div>
                      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:5}}>
                        <div className="tt-kv">
                          <div className="tt-k">停損價</div>
                          <div className="tt-v" style={{color:'var(--red)'}}>{sl?.toFixed(1) ?? '—'}</div>
                          {riskPct && <div style={{fontSize:10,color:'var(--red)',marginTop:1}}>{riskPct}%</div>}
                        </div>
                        <div className="tt-kv">
                          <div className="tt-k">目標價</div>
                          <div className="tt-v" style={{color:'var(--green)'}}>{tp?.toFixed(1) ?? '—'}</div>
                          {rewardPct && <div style={{fontSize:10,color:'var(--green)',marginTop:1}}>+{rewardPct}%</div>}
                        </div>
                        <div className="tt-kv">
                          <div className="tt-k">風報比</div>
                          <div className="tt-v" style={{color: rr>=3?'var(--green)':rr>=2?'var(--yellow)':'var(--red)'}}>
                            {rr ? `1 : ${rr}` : '—'}
                          </div>
                          {rr && <div style={{fontSize:9,color:'var(--text-muted)',marginTop:1}}>{rr>=3?'佳':rr>=2?'尚可':'偏低'}</div>}
                        </div>
                      </div>
                    </div>
                  );
                })()}

                {/* 買進條件 */}
                <div className="tt-section">
                  <div className="tt-section-label">策略買進條件 (需全部✅)</div>
                  <div className="tt-conds">
                    {condLabels.map(c => {
                      const pass = conds ? conds[c.key] : null;
                      return <div key={c.key} className={`tt-cond ${pass?'tt-cond-pass':'tt-cond-fail'}`}>
                        {pass==null?'○':pass?'✅':'❌'} {c.label}
                      </div>;
                    })}
                    <div className={`tt-cond ${row.adx14>=18&&row.adx14<=35?'tt-cond-pass':'tt-cond-fail'}`}>
                      {row.adx14>=18&&row.adx14<=35?'✅':'❌'} ADX 18–35
                    </div>
                    <div className={`tt-cond ${row.macd_h_strong?'tt-cond-pass':'tt-cond-fail'}`}>
                      {row.macd_h_strong?'✅':'❌'} MACD_H ≥60th pct
                    </div>
                  </div>
                </div>

                {/* 評分明細 */}
                <div className="tt-section">
                  <div className="tt-section-label">評分明細</div>
                  <div className="tt-score-list">
                    {(ov.allDetails||[]).filter(d=>d.pts!==0).map((d,i) => (
                      <div key={i} className="tt-score-row">
                        <span>{d.pts>0?'✅':'❌'} {d.text}</span>
                        <span className={d.pts>0?'tt-pts-pos':'tt-pts-neg'}>{d.pts>0?'+':''}{d.pts}</span>
                      </div>
                    ))}
                  </div>
                  <div className="tt-total">
                    <span style={{color:'var(--text-muted)'}}>總分</span>
                    <span style={{color:ov.color}}>{ov.score} 分</span>
                  </div>
                </div>
              </div>
            );
          })()}

        {/* ── v8.0 Claude Chat ── */}

        {/* Floating button */}
        <button className="chat-fab" onClick={() => setShowChat(v=>!v)} title="AI 助手">
          {showChat ? '✕' : '🤖'}
        </button>

        {/* Chat panel */}
        {showChat && (
          <div className="chat-panel">
            <div className="chat-header">
              <span>🤖 Gigi AI 助手</span>
              <span style={{fontSize:11,color:'var(--text-muted)'}}>可直接修改 code 並部署</span>
              <button className="modal-close" onClick={() => setShowChat(false)}>✕</button>
            </div>

            <div className="chat-messages">
              {chatMsgs.map((m, i) => (
                <div key={i} className={`chat-msg ${m.role}`}>
                  {m.role === 'assistant' && <div className="chat-avatar">🤖</div>}
                  <div className="chat-bubble">{m.content}</div>
                  {m.role === 'user' && <div className="chat-avatar">👤</div>}
                </div>
              ))}
              {chatLoading && (
                <div className="chat-msg assistant">
                  <div className="chat-avatar">🤖</div>
                  <div className="chat-bubble chat-thinking">
                    <span className="spinner" />
                    思考中…
                    {chatActions.length > 0 && (
                      <div className="chat-actions-live">
                        {chatActions.map((a,i) => <div key={i} className="chat-action">{a}</div>)}
                      </div>
                    )}
                  </div>
                </div>
              )}
              <div ref={chatEndRef} />
            </div>

            <div className="chat-input-row">
              <textarea
                className="chat-textarea"
                placeholder="叫我新增功能、修改介面、改參數…"
                value={chatInput}
                onChange={e => setChatInput(e.target.value)}
                onKeyDown={e => {
                  if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (chatInput.trim() && !chatLoading) sendChat();
                  } else if (e.key === 'Enter' && e.shiftKey) {
                    e.preventDefault();
                    setChatInput(v => v + '\n');
                  }
                }}
                rows={2}
              />
              <button
                className="chat-send"
                disabled={!chatInput.trim() || chatLoading}
                onClick={() => {
                  async function sendChat() {
                    const text = chatInput.trim();
                    if (!text || chatLoading) return;
                    const newMsgs = [...chatMsgs, { role:'user', content:text }];
                    setChatMsgs(newMsgs);
                    setChatInput('');
                    setChatLoading(true);
                    setChatActions([]);
                    setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior:'smooth' }), 50);
                    try {
                      const res = await fetch(`${API_BASE}/api/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type':'application/json' },
                        body: JSON.stringify({ messages: newMsgs.map(m => ({ role: m.role, content: typeof m.content === 'string' ? m.content : JSON.stringify(m.content) })) })
                      });
                      const data = await res.json();
                      setChatMsgs(prev => [...prev, { role:'assistant', content: data.response || '（無回應）' }]);
                      if (data.actions?.length) setChatActions(data.actions);
                    } catch(e) {
                      setChatMsgs(prev => [...prev, { role:'assistant', content:`❌ 錯誤：${e.message}` }]);
                    } finally {
                      setChatLoading(false);
                      setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior:'smooth' }), 100);
                    }
                  }
                  sendChat();
                }}
              >
                {chatLoading ? <span className="spinner"/> : '送出'}
              </button>
            </div>
          </div>
        )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
